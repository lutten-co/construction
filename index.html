<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:7px 10px;background:var(--s2);color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.mono{font-family:'DM Mono',monospace;font-size:12px;}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--bdr);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.12s;vertical-align:middle;}
.chk:hover{border-color:var(--green);}
.chk.on{background:var(--green);border-color:var(--green);}
.chk.on::after{content:"✓";color:#000;font-size:12px;font-weight:900;}
.wi{background:var(--s2);border:1px solid var(--bdr);border-radius:5px;padding:4px 7px;color:var(--txt);font-size:12px;font-family:'DM Mono',monospace;outline:none;width:76px;text-align:right;}
.wi:focus{border-color:var(--acc);}
.cs{background:var(--s2);border:1px solid var(--bdr);border-radius:5px;padding:4px 7px;color:var(--txt);font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.cs:focus{border-color:var(--acc);}
.btn{padding:6px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s;}
.bp{background:var(--acc);color:#000;}.bp:hover{filter:brightness(1.1);}
.bs{background:var(--s2);color:var(--txt);border:1px solid var(--bdr);}.bs:hover{border-color:var(--mut);}
.bd{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.25);}
.bsm{padding:4px 9px;font-size:11px;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:99;padding:20px;}
.mod{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.fg{display:grid;gap:10px;}
.f2{grid-template-columns:1fr 1fr;}
.fl{display:flex;flex-direction:column;gap:4px;}
.fl label{font-size:11px;color:var(--mut);font-weight:500;}
.fl input,.fl select{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:7px 9px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;width:100%;}
.fl input:focus,.fl select:focus{border-color:var(--acc);}
.fl input::placeholder{color:var(--mut);}
.mr{display:flex;gap:8px;margin-top:14px;}
.hr{height:1px;background:var(--bdr);margin:12px 0;}
.muted{color:var(--mut);font-size:13px;padding:6px 0;}
</style>

<script>
/* Firebase Realtime Database REST API - no preflight CORS */
(function(){
  var DB="https://lutten-co-default-rtdb.asia-southeast1.firebasedatabase.app";

  /* READ: simple GET, no preflight */
  function fbGet(path){
    return fetch(DB+"/cg/"+path+".json")
      .then(function(r){return r.json();});
  }

  /* WRITE: use XMLHttpRequest to avoid preflight CORS */
  function fbPut(path,data){
    return new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.open("PUT",DB+"/cg/"+path+".json",true);
      xhr.setRequestHeader("Content-Type","application/json");
      xhr.onload=function(){resolve(xhr.responseText);};
      xhr.onerror=function(){reject(new Error("XHR error"));};
      xhr.send(JSON.stringify(data));
    });
  }

  window.fbSv=function(k,v){
    fbPut(k,v).catch(function(e){console.warn("FB write",k,e.message);});
  };

  window.fbSync=function(keys,cb){
    var left=keys.length;
    if(!left){cb();return;}
    keys.forEach(function(k){
      var _done=false;
      var _t=setTimeout(function(){
        if(!_done){_done=true;if(--left===0)cb();}
      },6000);
      fbGet(k).then(function(data){
        if(!_done){_done=true;clearTimeout(_t);
          if(data!==null&&data!==undefined)
            try{localStorage.setItem("cg_"+k,JSON.stringify(data));}catch(e){}
          if(--left===0)cb();
        }
      }).catch(function(e){
        if(!_done){_done=true;clearTimeout(_t);
          console.warn("FB err",k,e.message);
          if(--left===0)cb();}
      });
    });
  };

  window.fbReady=true;
  console.log("Firebase REST ready");
})();
</script>
<script>
/* ── Storage ── */





function insChipLabel(n){
  var nm=getName(n)||n;
  var w=W.find(function(x){return x.idNo===n||x.name===n;});
  var id=w?w.idNo:"";
  var dob=w?w.dob:"";
  var parts=[nm];
  if(id)parts.push(id);
  if(dob)parts.push(dob);
  return parts.join(" | ");
}
function insChipDOM(n,container){
  /* Build copyable chip: each segment can be clicked to copy */
  var nm=getName(n)||n;
  var w=W.find(function(x){return x.idNo===n||x.name===n;});
  var id=w?w.idNo:"";
  var dob=w?w.dob:"";
  var wrap=document.createElement("div");
  wrap.style.cssText="padding:5px 8px;background:rgba(88,166,255,.08);border-radius:5px;margin-bottom:4px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;";
  function mkSpan(txt,color){
    var sp=document.createElement("span");
    sp.style.cssText="font-size:13px;font-weight:600;cursor:pointer;padding:1px 5px;border-radius:3px;"+
      (color?"color:"+color+";":"color:var(--txt);")+
      "transition:.1s;";
    sp.textContent=txt;
    sp.title="點擊複製";
    sp.addEventListener("mouseenter",function(){this.style.background="var(--acc)";this.style.color="#000";});
    sp.addEventListener("mouseleave",function(){this.style.background="";this.style.color=color||"var(--txt)";});
    sp.addEventListener("click",function(e){
      e.stopPropagation();
      if(navigator.clipboard){navigator.clipboard.writeText(txt);}
      else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
      sp.style.background="var(--green)";sp.style.color="#000";
      setTimeout(function(){sp.style.background="";sp.style.color=color||"var(--txt)";},600);
    });
    return sp;
  }
  wrap.appendChild(mkSpan(nm,null));
  if(id){var sep1=document.createElement("span");sep1.style.cssText="color:var(--mut);font-size:11px;";sep1.textContent="|";wrap.appendChild(sep1);wrap.appendChild(mkSpan(id,"var(--blue)"));}
  if(dob){var sep2=document.createElement("span");sep2.style.cssText="color:var(--mut);font-size:11px;";sep2.textContent="|";wrap.appendChild(sep2);wrap.appendChild(mkSpan(dob,"var(--mut)"));}
  container.appendChild(wrap);
}
function syncPayWorkers(){
  var st=window._salState;
  if(!st||!st.workers)return;
  st.workers.forEach(function(wr,wi){
    var nSel=document.getElementById("pdName_"+wi);
    if(nSel&&!wr._manual)wr.name=nSel.value;
    var mgmt=document.getElementById("pdMgmt_"+wi);if(mgmt)wr.mgmt=+mgmt.value||0;
    var dorm=document.getElementById("pdDorm_"+wi);if(dorm)wr.dorm=+dorm.value||0;
    var loan=document.getElementById("pdLoan_"+wi);if(loan)wr.loan=+loan.value||0;
    var savem=document.getElementById("pdSave_"+wi);if(savem)wr.save_money=+savem.value||0;
    var note=document.getElementById("pdNote_"+wi);if(note)wr.note=note.value||"";
    (wr.dates||[]).forEach(function(de,di){
      var wInp=document.getElementById("pdW_"+wi+"_"+di);if(wInp)de.wage=+wInp.value||0;
      var otInp=document.getElementById("pdOT_"+wi+"_"+di);if(otInp)de.overtime=+otInp.value||0;
    });
  });
}
function openPdDateCal(){
  var inp=document.getElementById("pdDate");
  var pop=document.getElementById("pdDateCalPop");
  if(!inp||!pop)return;
  if(pop.children.length){pop.innerHTML="";return;}
  var m=inp.value.match(/(\d+)\u5e74(\d+)\u6708(\d+)\u65e5/);
  var yr=m?+m[1]:+(rocToday2().match(/(\d+)\u5e74/)[1]);
  var mo=m?+m[2]:+(rocToday2().match(/\u5e74(\d+)\u6708/)[1]);
  function bld(y,mn){
    pop.innerHTML="";
    var wrap=document.createElement("div");wrap.style.cssText="background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:10px;margin-top:4px;";
    var nav=document.createElement("div");nav.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:8px;";
    var pB=document.createElement("button");pB.className="btn bs bsm";pB.textContent="\u25c0";
    pB.addEventListener("click",function(e){e.stopPropagation();mn--;if(mn<1){mn=12;y--;}bld(y,mn);});
    var nB=document.createElement("button");nB.className="btn bs bsm";nB.textContent="\u25b6";
    nB.addEventListener("click",function(e){e.stopPropagation();mn++;if(mn>12){mn=1;y++;}bld(y,mn);});
    var lb=document.createElement("span");lb.style.cssText="flex:1;text-align:center;font-size:13px;font-weight:700;";
    lb.textContent=y+"\u5e74"+mn+"\u6708";nav.appendChild(pB);nav.appendChild(lb);nav.appendChild(nB);wrap.appendChild(nav);
    var gd=document.createElement("div");gd.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;";
    ["\u65e5","\u4e00","\u4e8c","\u4e09","\u56db","\u4e94","\u516d"].forEach(function(d){
      var h=document.createElement("div");h.style.cssText="text-align:center;font-size:10px;color:var(--mut);padding:2px 0;";h.textContent=d;gd.appendChild(h);
    });
    var fd=new Date(y+1911,mn-1,1).getDay();var dm=new Date(y+1911,mn,0).getDate();
    for(var b=0;b<fd;b++)gd.appendChild(document.createElement("div"));
    for(var day=1;day<=dm;day++){
      var cell=document.createElement("div");
      cell.style.cssText="text-align:center;padding:5px 2px;border-radius:4px;cursor:pointer;font-size:12px;background:var(--s2);color:var(--txt);";
      cell.textContent=day;
      cell.addEventListener("mouseenter",function(){this.style.background="var(--acc)";this.style.color="#000";});
      cell.addEventListener("mouseleave",function(){this.style.background="var(--s2)";this.style.color="var(--txt)";});
      (function(d2){cell.addEventListener("click",function(){inp.value=y+"\u5e74"+mn+"\u6708"+d2+"\u65e5";pop.innerHTML="";});})(day);
      gd.appendChild(cell);
    }
    wrap.appendChild(gd);pop.appendChild(wrap);
  }
  bld(yr,mo);
}
function openAbsentPicker(group,dt,state,signBox){
  var allWorkers=[];
  group.forEach(function(item){var d=item.entry;(d.roughNames||[]).concat(d.stoneNames||[]).filter(Boolean).forEach(function(n){if(allWorkers.indexOf(n)<0)allWorkers.push(n);});});
  var ov=document.createElement("div");ov.className="ov";ov.style.cssText="z-index:210;";
  var box=document.createElement("div");box.className="mod";box.style.maxWidth="460px";
  var h=document.createElement("div");h.style.cssText="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px;";
  h.textContent="選擇未到人員";box.appendChild(h);
  var hint=document.createElement("div");hint.style.cssText="font-size:11px;color:var(--mut);margin-bottom:10px;";
  hint.textContent="點選後在簽單顯示刪除線＋未到標註";box.appendChild(hint);
  if(!window._absentSet)window._absentSet={};
  var absentSet=window._absentSet;
  var grid=document.createElement("div");grid.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;";
  allWorkers.forEach(function(idNo){
    var key=dt+"|"+idNo;
    var isAbs=!!absentSet[key];
    var pill=document.createElement("div");
    pill.style.cssText="padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid "+(isAbs?"var(--red)":"var(--bdr)")+";background:"+(isAbs?"rgba(248,81,73,.1)":"var(--s2)")+";color:"+(isAbs?"var(--red)":"var(--txt)")+";position:relative;transition:.12s;";
    var nm=document.createElement("span");nm.textContent=getName(idNo)||idNo;
    if(isAbs){nm.style.textDecoration="line-through";var t=document.createElement("span");t.style.cssText="font-size:10px;position:absolute;bottom:2px;right:4px;color:var(--red);";t.textContent="未到";pill.appendChild(t);}
    pill.insertBefore(nm,pill.firstChild);
    pill.addEventListener("click",function(){
      absentSet[key]=!absentSet[key];
      if(!state[idNo])state[idNo]={count:1,overtime:0,type:"rough",name:getName(idNo)};
      state[idNo].absent=absentSet[key];
      if(ov.parentNode)ov.parentNode.removeChild(ov);
      openAbsentPicker(group,dt,state,signBox);
      if(window._signRebuild)window._signRebuild();
    });
    grid.appendChild(pill);
  });
  box.appendChild(grid);
  var row=document.createElement("div");row.style.cssText="display:flex;gap:8px;";
  var done=document.createElement("button");done.className="btn bp";done.textContent="完成";
  done.addEventListener("click",function(){if(ov.parentNode)ov.parentNode.removeChild(ov);if(window._signRebuild)window._signRebuild();});
  var can=document.createElement("button");can.className="btn bs";can.textContent="取消";
  can.addEventListener("click",function(){if(ov.parentNode)ov.parentNode.removeChild(ov);});
  row.appendChild(done);row.appendChild(can);box.appendChild(row);
  ov.appendChild(box);document.body.appendChild(ov);
}
function openSwapSign(group,dt,state,signBox){
  var ov=document.createElement("div");ov.className="ov";ov.style.cssText="z-index:210;";
  var box=document.createElement("div");box.className="mod";box.style.maxWidth="480px";
  var allWorkers=[];
  group.forEach(function(item){
    var d=item.entry;
    (d.roughNames||[]).concat(d.stoneNames||[]).filter(Boolean).forEach(function(n){if(allWorkers.indexOf(n)<0)allWorkers.push(n);});
  });
  var selected={};
  allWorkers.forEach(function(n){selected[n]=false;});
  function buildStep1(){
    box.innerHTML="";
    var h=document.createElement("div");h.style.cssText="font-size:13px;font-weight:700;color:var(--acc);margin-bottom:10px;";h.textContent="步驟 1：選擇要換簽的人員";box.appendChild(h);
    var grid=document.createElement("div");grid.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;";
    allWorkers.forEach(function(idNo){
      var pill=document.createElement("div");
      pill.style.cssText="padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:2px solid "+(selected[idNo]?"var(--acc)":"var(--bdr)")+";background:"+(selected[idNo]?"rgba(240,180,41,.15)":"var(--s2)")+";color:"+(selected[idNo]?"var(--acc)":"var(--txt)")+";transition:.12s;";
      pill.textContent=getName(idNo)||idNo;
      pill.addEventListener("click",function(){
        selected[idNo]=!selected[idNo];
        pill.style.border="2px solid "+(selected[idNo]?"var(--acc)":"var(--bdr)");
        pill.style.background=selected[idNo]?"rgba(240,180,41,.15)":"var(--s2)";
        pill.style.color=selected[idNo]?"var(--acc)":"var(--txt)";
      });
      grid.appendChild(pill);
    });
    box.appendChild(grid);
    var row=document.createElement("div");row.style.cssText="display:flex;gap:8px;";
    var nxt=document.createElement("button");nxt.className="btn bp";nxt.textContent="下一步 →";
    var can=document.createElement("button");can.className="btn bs";can.textContent="取消";
    can.addEventListener("click",function(){document.body.removeChild(ov);});
    nxt.addEventListener("click",function(){
      var chosen=allWorkers.filter(function(n){return selected[n];});
      if(!chosen.length){alert("請選擇人員");return;}
      buildStep2(chosen);
    });
    row.appendChild(nxt);row.appendChild(can);box.appendChild(row);
  }
  function buildStep2(chosen){
    box.innerHTML="";
    var h2=document.createElement("div");h2.style.cssText="font-size:13px;font-weight:700;color:var(--acc);margin-bottom:8px;";h2.textContent="步驟 2：選擇新簽單日期";box.appendChild(h2);
    var ppl=document.createElement("div");ppl.style.cssText="font-size:12px;color:var(--mut);margin-bottom:10px;";ppl.textContent="人員："+chosen.map(function(n){return getName(n)||n;}).join("、");box.appendChild(ppl);
    var dInp=document.createElement("input");dInp.readOnly=true;dInp.value=rocToday2();
    dInp.style.cssText="cursor:pointer;background:var(--s2);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:14px;font-family:DM Mono,monospace;font-weight:700;outline:none;width:100%;margin-bottom:8px;";
    var calPop=document.createElement("div");

/* ── idNo helpers ─────────────────────────────────── */
function getIdNo(name){
  for(var i=0;i<W.length;i++){if(W[i].name===name)return W[i].idNo||W[i].name;}
  return name;
}
function getName(idNo){
  for(var i=0;i<W.length;i++){
    if(W[i].idNo===idNo)return W[i].name;
    if(W[i].name===idNo)return idNo; /* fallback: legacy name-stored */
  }
  return idNo;
}
function getWorker(idNo){
  for(var i=0;i<W.length;i++){if(W[i].idNo===idNo||W[i].name===idNo)return W[i];}
  return null;
}

/* ── Date helpers ── */
function rocDateInt(s){var m=s?s.match(/(\d+)年(\d+)月(\d+)日/):null;return m?+m[1]*10000+ +m[2]*100+ +m[3]:0;}
function rocAddDays(s,delta){var m=s?s.match(/(\d+)年(\d+)月(\d+)日/):null;if(!m)return s;var d=new Date(+m[1]+1911,+m[2]-1,+m[3]);d.setDate(d.getDate()+delta);return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function rocToday2(){var d=new Date();return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function getSortedDates(){var dates=[];DT.forEach(function(d){if(d.date&&dates.indexOf(d.date)<0)dates.push(d.date);});return dates.sort(function(a,b){return rocDateInt(b)-rocDateInt(a);});}
function updateHint(dt){var hint=document.getElementById("d_dateHint");if(!hint)return;var same=DT.filter(function(d){return d.date===dt;});var sorted=getSortedDates();var prev=null;for(var k=0;k<sorted.length;k++){if(rocDateInt(sorted[k])<rocDateInt(dt)){prev=sorted[k];break;}}if(same.length){hint.style.color="var(--green)";hint.textContent="此日已有"+same.length+"筆出工記錄";}else{hint.style.color="var(--mut)";hint.textContent=prev?"前一期："+prev+" — 可自動帶入":"";}  }
function autoLoadPrev(dt,isEdit){if(isEdit)return;var sorted=getSortedDates();var prev=null;for(var k=0;k<sorted.length;k++){if(rocDateInt(sorted[k])<rocDateInt(dt)){prev=sorted[k];break;}}if(!prev){dRows=[makeEmptyRow()];renderDRows();return;}var prevEntries=DT.filter(function(d){return d.date===prev;});dRows=prevEntries.map(function(d){return{locIdx:findLocIdx(d.loc),roughNames:[],stoneNames:[],note:d.note||""};});if(!dRows.length)dRows=[makeEmptyRow()];renderDRows();}

function updateTabLabels(tabR,tabS,tabN){
  if(!tabR)tabR=document.getElementById("tab-r");

  if(tabS)tabS.textContent="🟣 打石工（"+cnt("打石工")+"人，已勾"+ac("打石工")+"）";
  if(tabN)tabN.textContent="⏸ 暫時未做（"+cnt("暫時未做")+"人）";
}
function setT(t){
  wTab=t;
  ["tab-r","tab-s","tab-n"].forEach(function(id,i){var el=document.getElementById(id);if(el)el.className="tb"+(t===["粗工","打石工","暫時未做"][i]?" on":"");});
  rT();
}
function rT(){
  updateTabLabels();
  var q=wSearch.toLowerCase();
  var list=W.filter(function(w){return w.category===wTab&&(w.name.toLowerCase().indexOf(q)>=0||(w.idNo||"").toLowerCase().indexOf(q)>=0);});
  var wc=document.getElementById("wcount");if(wc)wc.textContent="共"+list.length+"人";
  var tblEl=document.querySelector("#pg table");
  if(tblEl){var th0=tblEl.querySelector("th");if(th0)th0.style.display=(wTab==="暫時未做"?"none":"");}
  var tb=document.getElementById("wtbody");if(!tb)return;tb.innerHTML="";
  list.forEach(function(w){
    var on=!!(ATT[w.idNo]||ATT[w.id]); /* support both legacy id and idNo */
    var tr=document.createElement("tr");if(on)tr.style.background="rgba(63,185,80,.06)";
    var tc=document.createElement("td");tc.style.textAlign="center";if(wTab==="暫時未做")tc.style.display="none";
    var chk=document.createElement("div");chk.className="chk"+(on?" on":"");
    chk.style.cssText="width:28px;height:28px;border-radius:6px;border:2px solid "+(on?"var(--green)":"var(--bdr)")+";cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:16px;background:"+(on?"var(--green)":"transparent")+";";
    chk.textContent=on?"✔":"";
    (function(el,id){el.addEventListener("click",function(){toggleAtt(w.idNo);var isOn=!!(ATT[w.idNo]||ATT[w.id]);el.style.border="2px solid "+(isOn?"var(--green)":"var(--bdr)");el.style.background=isOn?"var(--green)":"transparent";el.textContent=isOn?"✔":"";});})(chk,w.id);
    tc.appendChild(chk);tr.appendChild(tc);
    var tn=document.createElement("td");var b=document.createElement("b");b.textContent=w.name;if(on)b.style.color="var(--green)";tn.appendChild(b);tr.appendChild(tn);
    var ti=document.createElement("td");ti.className="mono";ti.textContent=w.idNo||"—";tr.appendChild(ti);
    var td=document.createElement("td");td.className="mono";td.textContent=w.dobFmt||w.dob||"—";tr.appendChild(td);
    var tw=document.createElement("td");var inp=document.createElement("input");inp.className="wi";inp.type="number";inp.value=w.wage||0;
    inp.addEventListener("change",(function(id){return function(){upWage(id,this.value);};})(w.id));
    tw.appendChild(inp);tw.appendChild(document.createTextNode(" 元"));tr.appendChild(tw);
    var tcat=document.createElement("td");var sel=document.createElement("select");sel.className="cs";
    ["粗工","打石工","暫時未做"].forEach(function(cat){var opt=document.createElement("option");opt.value=cat;opt.textContent=cat;if(w.category===cat)opt.selected=true;sel.appendChild(opt);});
    sel.addEventListener("change",(function(id){return function(){upCat(id,this.value);};})(w.id));
    tcat.appendChild(sel);tr.appendChild(tcat);
    tb.appendChild(tr);
  });
}

function fmtDob(raw){var s=String(raw).trim().replace(/\D/g,"").padStart(7,"0");if(s.length>=7){return parseInt(s.substring(0,3),10)+"年"+parseInt(s.substring(3,5),10)+"月"+parseInt(s.substring(5,7),10)+"日";}return raw;}
function doAdd(){var n=document.getElementById("an").value.trim();if(!n){alert("請輸入姓名");return;}var cat=document.getElementById("ac").value;var raw=document.getElementById("ad").value.trim();W.push({id:Date.now(),no:0,name:n,idNo:document.getElementById("ai").value.trim(),dob:raw,dobFmt:fmtDob(raw),wage:parseFloat(document.getElementById("aw").value)||(cat==="打石工"?2400:(cat==="粗工"?1500:0)),category:cat});sv("workers",W);document.getElementById("wmodal").innerHTML="";rT();}

/* ── TODAY BOARD ── */
function pgB(){
  var today=new Date();
  var roc=(today.getFullYear()-1911)+"年"+(today.getMonth()+1)+"月"+today.getDate()+"日";
  var days=["日","一","二","三","四","五","六"];
  var rList=W.filter(function(w){return w.category==="粗工"&&(ATT[w.idNo]||ATT[w.id]);});
  var sList=W.filter(function(w){return w.category==="打石工"&&(ATT[w.idNo]||ATT[w.id]);});
  var rW=rList.reduce(function(s,w){return s+(w.wage||0);},0);
  var sW=sList.reduce(function(s,w){return s+(w.wage||0);},0);
  function pills(list,cls,color){if(!list.length)return "<div class='muted'>尚無人員勾選</div>";return list.map(function(w){return "<div style='display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--s1);border-radius:6px;margin-bottom:4px;border-left:3px solid "+color+";'><span style='font-weight:600;font-size:13px;'>"+esc(w.name)+"</span><span style='font-family:DM Mono,monospace;font-size:12px;color:var(--mut);'>$"+(w.wage||0).toLocaleString()+"</span></div>";}).join("");}
  var h="<div class='card'><div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;'><div class='ct' style='margin-bottom:0;'>當前可上班表</div><span style='font-size:12px;color:var(--mut);font-family:DM Mono,monospace;'>"+roc+" 週"+days[today.getDay()]+"</span></div>";
  h+="<div style='display:grid;grid-template-columns:1fr 1fr;gap:12px;'>";
  h+="<div style='background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;'><div style='font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px;'>🔵 粗工（"+rList.length+"人）</div>"+pills(rList,"r","var(--blue)")+"</div>";
  h+="<div style='background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;'><div style='font-size:11px;font-weight:700;color:var(--purple);margin-bottom:8px;'>🟣 打石工（"+sList.length+"人）</div>"+pills(sList,"s","var(--purple)")+"</div>";
  h+="</div><div style='background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-top:12px;'>";
  h+="<div style='display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--bdr);font-size:13px;'><span>粗工人工成本</span><span style='font-family:DM Mono,monospace;'>$"+rW.toLocaleString()+"</span></div>";
  h+="<div style='display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--bdr);font-size:13px;'><span>打石工人工成本</span><span style='font-family:DM Mono,monospace;'>$"+sW.toLocaleString()+"</span></div>";
  h+="<div style='display:flex;justify-content:space-between;padding:5px 0;font-size:13px;font-weight:700;'><span>今日人工合計</span><span style='font-family:DM Mono,monospace;color:var(--acc);'>$"+(rW+sW).toLocaleString()+"</span></div>";
  h+="</div></div>";
  document.getElementById("pg").innerHTML=h;
}

function pgQ(){
  var act=document.getElementById("pact");
  var bar=document.createElement("div");bar.style.cssText="display:flex;gap:7px;align-items:center;flex-wrap:wrap;";
  var btnAdd=document.createElement("button");btnAdd.className="btn bp bsm";btnAdd.textContent="＋ 新增報價單";btnAdd.addEventListener("click",function(){openQ();});
  var selAllWrap=document.createElement("label");selAllWrap.style.cssText="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--mut);";
  var selAllChk=document.createElement("input");selAllChk.type="checkbox";
  selAllChk.addEventListener("change",function(){var chkd=this.checked;document.querySelectorAll(".chk[data-qi]").forEach(function(div){var qi=parseInt(div.getAttribute("data-qi"));if(isNaN(qi))return;var isOn=!!QSEED[qi].checked;if(chkd&&!isOn){QSEED[qi].checked=true;div.classList.add("on");}else if(!chkd&&isOn){QSEED[qi].checked=false;div.classList.remove("on");}});sv("quotes",QSEED);var cnt=QSEED.filter(function(q){return q.checked;}).length;var si=document.getElementById("qSelInfo");if(si)si.textContent="已勾選 "+cnt+" 份";});
  selAllWrap.appendChild(selAllChk);
  selAllWrap.appendChild(Object.assign(document.createElement("span"),{textContent:"全選"}));
  bar.appendChild(selAllWrap);
  var btnImp=document.createElement("button");btnImp.className="btn bs bsm";btnImp.textContent="✅ 匯入已勾選至客戶資料夾";btnImp.addEventListener("click",importChecked);
  var selInfo=document.createElement("span");selInfo.id="qSelInfo";selInfo.className="muted";selInfo.style.fontSize="12px";
  bar.appendChild(btnAdd);bar.appendChild(btnImp);bar.appendChild(selInfo);
  act.innerHTML="";act.appendChild(bar);updateSelInfo();
  var tabBar=document.createElement("div");tabBar.className="tabs";tabBar.style.marginBottom="0";
  function mkTab(label,val){var t=document.createElement("button");t.className="tb"+(qFilter===val?" on":"");t.textContent=label;t.addEventListener("click",function(){qFilter=val;pgQ();});return t;}
  var luCnt=Q.filter(function(q){return (q.co||"luten")==="luten";}).length;
  var shCnt=Q.filter(function(q){return q.co==="shenghua";}).length;
  tabBar.appendChild(mkTab("全部（"+Q.length+"）","all"));
  tabBar.appendChild(mkTab("🟠 壚騰（"+luCnt+"）","luten"));
  tabBar.appendChild(mkTab("🔵 陞驊（"+shCnt+"）","shenghua"));
  var list=Q.map(function(q,i){return{q:q,i:i};}).filter(function(x){return qFilter==="all"||(x.q.co||"luten")===qFilter;});
  var rows="";
  for(var k=0;k<list.length;k++){var i=list[k].i;var q=list[k].q;var isSh=(q.co||"luten")==="shenghua";var isChk=!!(q.checked);
    rows+="<tr style='"+(isChk?"background:rgba(63,185,80,.06);":"")+"'>"+
      "<td style='text-align:center;'><div class='chk"+(isChk?" on":"")+"' data-qi='"+i+"' data-qa='chk'></div></td>"+
      "<td><span style='display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;background:"+(isSh?"rgba(88,166,255,.15)":"rgba(255,166,87,.15)")+";color:"+(isSh?"var(--blue)":"var(--orange)")+"'>"+(isSh?"陞驊":"壚騰")+"</span></td>"+
      "<td><b style='"+(isChk?"color:var(--green);":"")+"'>"+esc(q.clientName)+"</b></td>"+
      "<td>"+esc(q.proj)+"</td><td class='mono' style='font-size:11px;'>"+esc(q.taxId)+"</td><td>"+esc(q.attn)+"</td>"+
      "<td class='mono' style='font-size:11px;white-space:nowrap;'>"+esc(q.date)+"</td>"+
      "<td style='white-space:nowrap;'><button class='btn bs bsm' data-qi='"+i+"' data-qa='p'>預覽</button> <button class='btn bs bsm' data-qi='"+i+"' data-qa='e'>編輯</button> <button class='btn bd bsm' data-qi='"+i+"' data-qa='d'>刪除</button></td></tr>";
  }
  var h="<div class='card'><div class='ct'>報價單資料夾（"+Q.length+"份）</div><div id='qTabBar'></div>";
  h+=list.length?"<div class='tbl-wrap' style='margin-top:10px;'><table><thead><tr><th style='width:36px;text-align:center;'>勾選</th><th>報價公司</th><th>客戶名稱</th><th>案名</th><th>統編</th><th>ATTN</th><th>日期</th><th></th></tr></thead><tbody>"+rows+"</tbody></table></div>":"<p class='muted' style='margin-top:12px;'>此分類無報價單</p>";
  h+="</div><div id='qmodal'></div><div id='qpreview'></div>";
  document.getElementById("pg").innerHTML=h;
  document.getElementById("qTabBar").appendChild(tabBar);
  document.querySelectorAll("[data-qa]").forEach(function(b){b.addEventListener("click",function(){var i=parseInt(this.dataset.qi);var a=this.dataset.qa;if(a==="chk")toggleQChk(i);else if(a==="p")previewQ(i);else if(a==="e")openQ(i);else delQ(i);});});
}
function toggleQChk(i){Q[i].checked=!Q[i].checked;sv("quotes",Q);pgQ();}
function updateSelInfo(){var n=Q.filter(function(q){return q.checked;}).length;var el=document.getElementById("qSelInfo");if(el)el.textContent=n?"已勾選"+n+"份":"";}
function importChecked(){var sel=Q.filter(function(q){return q.checked;});if(!sel.length){alert("請先勾選要匯入的報價單");return;}var added=0,skipped=0;sel.forEach(function(q){if(C.some(function(c){return c.con===q.clientName&&c.proj===q.proj;})){skipped++;return;}var newCid=(function(){var mx=0;C.forEach(function(cl){if(cl.cid&&cl.cid>mx)mx=cl.cid;});return mx+1;})();
      C.push({cid:newCid,co:q.co,con:q.clientName,alias:q.clientName,proj:q.proj,taxId:q.taxId||"",p1:q.p1||0,p2:q.p2||0,p3:q.p3||0,p4:q.p4||0,p5:q.p5||0,p6:q.p6||0,status:"active"});
      /* Store clientCid back to the quote record */
      q.clientCid=newCid;added++;});sv("clients",C);alert("已匯入"+added+"筆"+( skipped?("，"+skipped+"筆重複略過"):""));pgQ();}
function openQ(idx){var q=idx!==undefined?Q[idx]:{co:"luten",clientName:"",proj:"",taxId:"",date:rocToday2(),attn:"",tel:"",p1:2000,p2:333,p3:2600,p4:432,p5:3100,p6:515};var qm=document.getElementById("qmodal");var ov=document.createElement("div");ov.className="ov";var box=document.createElement("div");box.className="mod";box.style.maxWidth="540px";
box.innerHTML="<div class='ct'>"+(idx!==undefined?"編輯":"新增")+"報價單</div><div class='fg'><div class='fl'><label>報價公司</label><select id='qco'><option value='luten'"+(q.co==="luten"?" selected":"")+">壚騰有限公司</option><option value='shenghua'"+(q.co==="shenghua"?" selected":"")+">陞驊實業有限公司</option></select></div></div><div class='hr'></div><div class='fg f2'><div class='fl'><label>客戶名稱</label><input id='qcn' value='"+ea(q.clientName||"")+"' placeholder='例：耕建築股份有限公司'></div><div class='fl'><label>案名</label><input id='qpj' value='"+ea(q.proj||"")+"' placeholder='例：耕心冉冉'></div><div class='fl'><label>統一編號</label><input id='qtx' value='"+ea(q.taxId||"")+"'></div><div class='fl'><label>日期</label><input id='qdt' value='"+ea(q.date||"")+"'></div><div class='fl'><label>ATTN</label><input id='qat' value='"+ea(q.attn||"")+"'></div><div class='fl'><label>TEL</label><input id='qtl' value='"+ea(q.tel||"")+"'></div></div><div class='hr'></div><div class='fg f2'><div class='fl'><label>點工（/工）</label><input id='qp1' type='number' value='"+(q.p1||0)+"'></div><div class='fl'><label>點工加班（/時）</label><input id='qp2' type='number' value='"+(q.p2||0)+"'></div><div class='fl'><label>技術工（/工）</label><input id='qp3' type='number' value='"+(q.p3||0)+"'></div><div class='fl'><label>技術工加班（/時）</label><input id='qp4' type='number' value='"+(q.p4||0)+"'></div><div class='fl'><label>打石工（/工）</label><input id='qp5' type='number' value='"+(q.p5||0)+"'></div><div class='fl'><label>打石工加班（/時）</label><input id='qp6' type='number' value='"+(q.p6||0)+"'></div></div><div class='mr'><button class='btn bp' id='qok'>儲存</button><button class='btn bs' id='qcx'>取消</button></div>";

function buildClientOpts(selVal){

function salRocToRoc(s){var m=s&&s.match(/(\d+)年(\d+)月(\d+)日/);return m?{y:+m[1],m:+m[2],d:+m[3]}:null;}
function salRocToKey(s){var p=salRocToRoc(s);return p?p.y*10000+p.m*100+p.d:0;}
function salKeyToRoc(k){var y=Math.floor(k/10000),m=Math.floor((k%10000)/100),d=k%100;return y+"年"+m+"月"+d+"日";}
function salRocNow(){var d=new Date();return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function salGetDefaultWage(name){
  /* name can be idNo or display name */
  var w=W.find(function(x){return x.idNo===name||x.name===name;});
  return w?w.wage||0:0;
}
function salGetPeople(){
  var sortedDates=getSortedDates().slice(0,30);
  var people=[];
  sortedDates.forEach(function(dt){
    DT.filter(function(d){return d.date===dt;}).forEach(function(d){
      (d.roughNames||[]).concat(d.stoneNames||[]).forEach(function(n){
        if(n&&people.indexOf(n)<0) people.push(n);
      });
    });
  });
  return people;
}
function salDupCheck(payDate,workerName,dates){
  var dups=[];
  SAL.forEach(function(rec){
    if(rec.payDate===payDate) return;
    (rec.records||[]).forEach(function(wr){
      if(wr.name===workerName){
        (wr.dates||[]).forEach(function(de){
          if(dates.indexOf(de.date)>=0) dups.push({payDate:rec.payDate,date:de.date});
        });
      }
    });
  });
  return dups;
}

/* Helper: select a specific date in the salary calendar */
function weSelectDate(dt){
  var st=window._salWE;if(!st)return;
  var k=salRocToKey(dt);
  if(!st.dates)st.dates=[];
  var idx=st.dates.findIndex(function(d){return salRocToKey(d.date)===k;});
  if(idx<0){st.dates.push({date:dt,wage:st._defWage||salGetDefaultWage(st.name||""),overtime:0});st.dates.sort(function(a,b){return salRocToKey(a.date)-salRocToKey(b.date);});}
  weRenderCal();weRenderWageRows();weCalcSum();
}

function weRenderCal(){
  var st=window._salWE;
  /* Init year/month from today if null */
  if(!st._calYear||!st._calMonth){
    var _td=salRocToRoc(rocToday2());
    if(_td){st._calYear=_td.y;st._calMonth=_td.m;}
    else{var _now=new Date();st._calYear=_now.getFullYear()-1911;st._calMonth=_now.getMonth()+1;}
  }
  var yr=st._calYear; var mo=st._calMonth;
  var selKeys=st.dates.map(function(d){return salRocToKey(d.date);});
  var calDiv=document.getElementById("weCal"); if(!calDiv) return;
  calDiv.innerHTML="";

  /* nav */
  var nav=document.createElement("div"); nav.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:8px;";
  var pBtn=document.createElement("button"); pBtn.className="btn bs bsm"; pBtn.textContent="◀";
  pBtn.addEventListener("click",function(){st._calMonth--;if(st._calMonth<1){st._calMonth=12;st._calYear--;}weRenderCal();});
  var nBtn=document.createElement("button"); nBtn.className="btn bs bsm"; nBtn.textContent="▶";
  nBtn.addEventListener("click",function(){st._calMonth++;if(st._calMonth>12){st._calMonth=1;st._calYear++;}weRenderCal();});
  var lbl=document.createElement("span"); lbl.style.cssText="flex:1;text-align:center;font-size:13px;font-weight:700;"; lbl.textContent=yr+"年"+mo+"月";
  nav.appendChild(pBtn); nav.appendChild(lbl); nav.appendChild(nBtn); calDiv.appendChild(nav);

  /* weekday headers */
  var grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;";
  ["日","一","二","三","四","五","六"].forEach(function(d){
    var h=document.createElement("div"); h.style.cssText="text-align:center;font-size:10px;color:var(--mut);padding:3px 0;"; h.textContent=d; grid.appendChild(h);
  });

  var adY=yr+1911;
  var firstDay=new Date(adY,mo-1,1).getDay();
  var daysInMo=new Date(adY,mo,0).getDate();
  for(var b=0;b<firstDay;b++) grid.appendChild(document.createElement("div"));
  for(var day=1;day<=daysInMo;day++){
    var key=yr*10000+mo*100+day;
    var isSel=selKeys.indexOf(key)>=0;
    var cell=document.createElement("div");
    /* Use the already-computed key (not k which is IIFE-scoped below) */
    var isUnpaid=getUnpaidSignDates(st.name||st.idNo||"").indexOf(salKeyToRoc(key))>=0;
    cell.style.cssText="text-align:center;padding:6px 2px;border-radius:5px;cursor:pointer;font-size:12px;transition:.1s;"+
      (isSel?"background:var(--acc);color:#000;font-weight:700;":
       isUnpaid?"background:rgba(63,185,80,.15);color:var(--green);font-weight:700;border:1px solid var(--green);"
              :"background:var(--s2);color:var(--txt);");
    cell.textContent=day;
    (function(k){
      cell.addEventListener("click",function(){
        var idx=st.dates.findIndex(function(d){return salRocToKey(d.date)===k;});
        if(idx>=0) st.dates.splice(idx,1);
        else{st.dates.push({date:salKeyToRoc(k),wage:st._defWage,overtime:0});st.dates.sort(function(a,b){return salRocToKey(a.date)-salRocToKey(b.date);});}
        weRenderCal(); weRenderWageRows(); weCalcSum();
      });
    })(key);
    grid.appendChild(cell);
  }
  calDiv.appendChild(grid);

  /* selected summary */
  if(st.dates.length){
    var s=document.createElement("div"); s.style.cssText="font-size:11px;color:var(--green);margin-top:4px;";
    s.textContent="已選："+st.dates.length+"天　"+st.dates.map(function(d){return d.date;}).join("、");
    calDiv.appendChild(s);
  }
}

function weCalcSum(){
  var st=window._salWE; if(!st) return;
  var tw=0,tot=0;
  st.dates.forEach(function(d,i){
    tw+=parseFloat((document.getElementById("weW_"+i)||{value:d.wage}).value)||0;
    tot+=parseFloat((document.getElementById("weOT_"+i)||{value:d.overtime}).value)||0;
  });
  var total=tw+tot;
  var mg=+(document.getElementById("weMgmt")||{value:0}).value||0;
  var do2=+(document.getElementById("weDorm")||{value:0}).value||0;
  var lo=+(document.getElementById("weLoan")||{value:0}).value||0;
  var actual=total-mg-do2-lo;
  var el=document.getElementById("weSum"); if(!el) return;
  el.innerHTML=
    "<div style='display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--bdr);'><span style='color:var(--mut);'>薪資合計</span><span>$"+tw.toLocaleString()+"</span></div>"+
    "<div style='display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--bdr);'><span style='color:var(--mut);'>加班合計</span><span>$"+tot.toLocaleString()+"</span></div>"+

    "<div style='display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--bdr);'><span style='color:var(--red);'>扣項</span><span style='color:var(--red);'>－$"+(mg+do2+lo).toLocaleString()+"</span></div>"+

function weSave(){

  st.dates.forEach(function(d,i){
    d.wage=parseFloat((document.getElementById("weW_"+i)||{value:d.wage}).value)||0;
    d.overtime=parseFloat((document.getElementById("weOT_"+i)||{value:d.overtime}).value)||0;
  });
  var payDate=(document.getElementById("wePayDate")||{value:st.payDate}).value.trim()||st.payDate;
  var wrRec={
    name:st.name, idNo:getIdNo(st.name), _manual:st.isManual||false,
    dates:st.dates.slice(),
    mgmt:+(document.getElementById("weMgmt")||{value:0}).value||0,
    dorm:+(document.getElementById("weDorm")||{value:0}).value||0,
    loan:+(document.getElementById("weLoan")||{value:0}).value||0,
        save_money:+(document.getElementById("weSaveInp")||{value:0}).value||0,
    note:(document.getElementById("weNote")||{value:""}).value.trim()
  };
  /* find existing payDay or create */
  var payIdx=SAL.findIndex(function(r){return r.payDate===payDate;});
  if(payIdx>=0){
    /* append worker to existing payDay */
    SAL[payIdx].records.push(wrRec);
  } else {
    SAL.unshift({payDate:payDate, records:[wrRec]});
  }
  sv("salary",SAL);
  var _dm=document.getElementById("salModal");
  if(_dm)_dm.innerHTML="";
  pgS();
}

function openWorkerSignEdit(idNo){

/* ─── 從 SIGN 取得某客戶的所有已簽出工記錄 ─────────────────── */
function getSignRowsForClient(clientCid){
  /* Returns [{date,rough,roughOT,stone,stoneOT,tech,techOT}] merged per signDate */
  var map={};
  SIGN.forEach(function(e){
    var match=(e.clientCid===clientCid);
    if(!match&&e.clientIdx>=0&&C[e.clientIdx])match=C[e.clientIdx].cid===clientCid;
    if(!match)return;
    var dt=e.signDate||e.date;
    if(!map[dt])map[dt]={date:dt,workDate:e.date,rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0};
    (e.entries||[]).forEach(function(en){
      if(!en.confirmed)return;
      if(en.type==="rough"||!en.type){map[dt].rough+=en.count||0;map[dt].roughOT+=en.overtime||0;}
      else if(en.type==="stone"){map[dt].stone+=en.count||0;map[dt].stoneOT+=en.overtime||0;}
      else if(en.type==="tech"){map[dt].tech+=en.count||0;map[dt].techOT+=en.overtime||0;}
      /* New multi-type format */
      if(en.rough!==undefined){map[dt].rough+=en.rough.count||0;map[dt].roughOT+=en.rough.overtime||0;map[dt].stone+=en.stone.count||0;map[dt].stoneOT+=en.stone.overtime||0;map[dt].tech+=en.tech.count||0;map[dt].techOT+=en.tech.overtime||0;}
    });
  });
  return Object.values(map).sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);});
}

/* ─── 計算某客戶的「未請款」工數 ─────────────────────────────── */
function getUnbilledRows(clientCid){
  var allRows=getSignRowsForClient(clientCid);
  /* 把已建立的請款單工數扣除 */
  var billed={};
  INV.forEach(function(inv){
    var match=(inv.clientCid===clientCid);
    if(!match&&inv.clientIdx>=0&&C[inv.clientIdx])match=C[inv.clientIdx].cid===clientCid;
    if(!match)return;
    (inv.rows||[]).forEach(function(r){
      if(!billed[r.date])billed[r.date]={rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0};
      billed[r.date].rough+=(r.rough||0);billed[r.date].roughOT+=(r.roughOT||0);
      billed[r.date].stone+=(r.stone||0);billed[r.date].stoneOT+=(r.stoneOT||0);
      billed[r.date].tech+=(r.tech||0);billed[r.date].techOT+=(r.techOT||0);
    });
  });
  var result=[];
  allRows.forEach(function(r){
    var b=billed[r.date]||{rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0};
    var row={
      date:r.date,
      rough:Math.max(0,r.rough-b.rough),roughOT:Math.max(0,r.roughOT-b.roughOT),
      stone:Math.max(0,r.stone-b.stone),stoneOT:Math.max(0,r.stoneOT-b.stoneOT),
      tech:Math.max(0,r.tech-b.tech),techOT:Math.max(0,r.techOT-b.techOT)
    };
    if(row.rough||row.stone||row.tech||row.roughOT||row.stoneOT||row.techOT)result.push(row);
  });
  return result;
}

/* ─── 計算金額 ───────────────────────────────────────────────── */
function calcInvAmount(rows,cc,taxIn){
  /* cc = client object with p1-p6 */
  var p1=cc&&cc.p1||0,p2=cc&&cc.p2||0; /* 粗工/粗工加班 */
  var p3=cc&&cc.p3||0,p4=cc&&cc.p4||0; /* 技術工/技術工加班 */
  var p5=cc&&cc.p5||0,p6=cc&&cc.p6||0; /* 打石工/打石工加班 */
  var subtotal=0;
  var breakdown=[];
  rows.forEach(function(r){
    var dm=r.date.match(/(\d+)月(\d+)日/);
    var dtLabel=dm?(dm[1]+"/"+dm[2]):r.date;
    var amt=0;
    var parts=[];
    if(r.rough&&p1){var a=r.rough*p1;amt+=a;parts.push("粗工"+r.rough+"工×"+p1+"="+a);}
    if(r.roughOT&&p2){var a2=Math.round(r.roughOT*(p2||Math.round(p1/8*1.33)));amt+=a2;parts.push("粗工加班"+r.roughOT+"h×"+Math.round(p2||p1/8*1.33)+"="+a2);}
    if(r.stone&&p5){var a3=r.stone*p5;amt+=a3;parts.push("打石"+r.stone+"工×"+p5+"="+a3);}
    if(r.stoneOT&&p6){var a4=Math.round(r.stoneOT*(p6||Math.round(p5/8*1.33)));amt+=a4;parts.push("打石加班"+r.stoneOT+"h×"+Math.round(p6||p5/8*1.33)+"="+a4);}
    if(r.tech&&p3){var a5=r.tech*p3;amt+=a5;parts.push("技術工"+r.tech+"工×"+p3+"="+a5);}
    if(r.techOT&&p4){var a6=Math.round(r.techOT*(p4||Math.round(p3/8*1.33)));amt+=a6;parts.push("技術工加班"+r.techOT+"h×"+Math.round(p4||p3/8*1.33)+"="+a6);}
    subtotal+=amt;
    breakdown.push({date:dtLabel,amt:amt,parts:parts,row:r});
  });
  var tax,total,pretax;
  if(taxIn){
    /* 稅內: reported price already includes tax */
    total=subtotal;
    tax=Math.round(subtotal/1.05*0.05);
    pretax=subtotal-tax;
  } else {
    pretax=subtotal;
    tax=Math.round(subtotal*0.05);
    total=subtotal+tax;
  }
  return {subtotal:pretax,tax:tax,total:total,taxIn:!!taxIn,breakdown:breakdown};
}

/* ─── autoFillInvRange: 自動帶入區間出工記錄 ─────────────────── */
function autoFillInvRange(){
  var cid=window._invClientCid;
  if(!cid){alert("請先選擇客戶");return;}
  var rf=document.getElementById("invRangeFrom").value;
  var rt=document.getElementById("invRangeTo").value;
  if(!rf||!rt){alert("請先選擇請款區間");return;}
  var fromInt=rocDateInt(rf);var toInt=rocDateInt(rt);
  /* Get unbilled rows for this client, filter by range */
  var unbilled=getUnbilledRows(cid);
  /* If editing, add back the rows from this invoice so they're available */
  var editIdx=window._invEditIdx;
  if(editIdx!==undefined&&INV[editIdx]){
    var editRows=INV[editIdx].rows||[];
    unbilled=unbilled.concat(editRows).sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);});
    /* Deduplicate by date, sum up */
    var merged={};
    unbilled.forEach(function(r){
      if(!merged[r.date])merged[r.date]={date:r.date,rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0};
      merged[r.date].rough+=r.rough||0;merged[r.date].roughOT+=r.roughOT||0;
      merged[r.date].stone+=r.stone||0;merged[r.date].stoneOT+=r.stoneOT||0;
      merged[r.date].tech+=r.tech||0;merged[r.date].techOT+=r.techOT||0;
    });
    unbilled=Object.values(merged).sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);});
  }
  var filtered=unbilled.filter(function(r){var di=rocDateInt(r.date);return di>=fromInt&&di<=toInt;});
  if(!filtered.length){alert("此區間內無未請款出工記錄");return;}
  window._invRows=filtered;
  renderInvRows();
}

/* ─── renderInvRows ─────────────────────────────────────────── */
function renderInvRows(){

    var tr=document.createElement("tr");

    var dtTd=document.createElement("td");dtTd.style.cssText="padding:4px 8px;border-bottom:1px solid var(--bdr);font-family:DM Mono,monospace;font-size:12px;";dtTd.textContent=dtLabel;tr.appendChild(dtTd);
    tdInp("rough","var(--blue)");tdInp("roughOT","var(--blue)");
    tdInp("tech","var(--purple)");tdInp("techOT","var(--purple)");
    tdInp("stone","var(--orange)");tdInp("stoneOT","var(--orange)");
    /* Row subtotal */
    var rowAmt=calcInvAmount([r],fakeCC);
    totalSubtotal+=rowAmt.subtotal;
    var amtTd=document.createElement("td");amtTd.style.cssText="padding:4px 8px;border-bottom:1px solid var(--bdr);text-align:right;font-family:DM Mono,monospace;font-size:12px;color:var(--acc);";amtTd.textContent=rowAmt.subtotal?"$"+rowAmt.subtotal.toLocaleString():"";tr.appendChild(amtTd);
    /* Delete row */
    var delTd=document.createElement("td");delTd.style.cssText="padding:4px 6px;border-bottom:1px solid var(--bdr);";
    var delBtn=document.createElement("button");delBtn.className="btn bd bsm";delBtn.textContent="✕";
    (function(ri2){delBtn.addEventListener("click",function(){rows.splice(ri2,1);renderInvRows();});})(ri);
    delTd.appendChild(delBtn);tr.appendChild(delTd);
    tbody.appendChild(tr);
  });
  /* Summary */
  if(summary){
    var tax2=Math.round(totalSubtotal*0.05);var tot=totalSubtotal+tax2;
    summary.innerHTML=rows.length?
      "<span style='color:var(--mut);margin-right:12px;'>共 "+rows.length+" 日</span>"+
      "<span style='margin-right:12px;'>未稅：<strong style='color:var(--txt);'>$"+totalSubtotal.toLocaleString()+"</strong></span>"+
      "<span style='margin-right:12px;'>稅金 5%：<strong style='color:var(--txt);'>$"+tax2.toLocaleString()+"</strong></span>"+
      "<span>含稅合計：<strong style='color:var(--acc);font-size:15px;'>$"+tot.toLocaleString()+"</strong></span>":
      "<span style='color:var(--mut);'>尚無出工記錄，請點「自動帶入出工記錄」</span>";
  }
}


/* ─── previewInv: PDF/列印預覽 ──────────────────────────────── */
function previewInv(editIdx){
  var inv=INV[editIdx];if(!inv)return;
  var cid=inv.clientCid;
  if(!cid&&inv.clientIdx>=0&&C[inv.clientIdx])cid=C[inv.clientIdx].cid;
  var cc=getClientByCid(cid)||{};
  var co=inv.co||cc.co||"luten";
  var coInfo=CO_INFO[co]||CO_INFO.luten;
  var prices=inv.prices||{p1:cc.p1||0,p2:cc.p2||0,p3:cc.p3||0,p4:cc.p4||0,p5:cc.p5||0,p6:cc.p6||0};
  var taxIn=!!inv.taxIn;
  var amt=calcInvAmount(inv.rows||[],prices,taxIn);
  var month=inv.month||"";
  var monthDisp=month.replace(/\d+年/,"");
  var payDate=inv.payDate||"尚未請款";

  /* Sort rows old→new */
  var sortedRows=(inv.rows||[]).slice().sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);});

  /* Totals per type */
  var totR=0,totROT=0,totS=0,totSOT=0,totT=0,totTOT=0;

function svSign(){sv("sign",SIGN);}

function findSignEntry(date,locOrClientIdx){
  for(var i=0;i<SIGN.length;i++){
    if(SIGN[i].date===date&&(SIGN[i].loc===locOrClientIdx||SIGN[i].clientIdx===locOrClientIdx))return i;
  }
  return -1;
}

function getSignState(date){
  /* Returns state object keyed by idNo for buildSignSheet compatibility */
  var state={};
  SIGN.filter(function(e){return e.date===date;}).forEach(function(e){
    (e.entries||[]).forEach(function(en){
      state[en.idNo]={
        selected:en.confirmed,count:en.count,overtime:en.overtime,
        type:en.type,name:en.name
      };
    });
  });
  /* Restore buGong */
  SIGN.filter(function(e){return e.date===date;}).forEach(function(e){
    if(e.buGong&&e.buGong.selected!==false){
      state["__bu__"+e.loc]=Object.assign({isBuGong:true},e.buGong);
    }
  });
  return state;
}

function saveSignState(date,group,state,signDate){
  if(!signDate)signDate=date;
  /* Persist sign state to SIGN DB */
  /* group = [{entry:{loc,...}}], state = {idNo:{selected,count,overtime,type,name}} */
  /* First remove old entries for this date */
  SIGN=SIGN.filter(function(e){return e.date!==date;});
  var byLoc={};
  group.forEach(function(item){
    var d=item.entry; var loc=d.loc||"";
    if(!byLoc[loc])byLoc[loc]={loc:loc,clientIdx:-1,entries:[]};
    var cIdx=findCIdxByLoc(loc);
    byLoc[loc].clientIdx=cIdx;
    (d.roughNames||[]).concat(d.stoneNames||[]).filter(function(n){return n;}).forEach(function(idNo){
      if(!byLoc[loc].entries.find(function(e){return e.idNo===idNo;})){
        var st=state[idNo]||{};
        byLoc[loc].entries.push({
          idNo:idNo,name:getName(idNo),
          type:st.type||"rough",count:st.count||1,
          overtime:st.overtime||0,confirmed:!!(st.selected)
        });
      }
    });
    /* Save buGong extra workers */
    var buKey="__bu__"+loc;
    var buSt=state[buKey];
    if(buSt&&buSt.isBuGong){
      byLoc[loc].buGong={rough:buSt.rough||0,roughOT:buSt.roughOT||0,
        tech:buSt.tech||0,techOT:buSt.techOT||0,
        stone:buSt.stone||0,stoneOT:buSt.stoneOT||0,
        selected:!!(buSt.selected)};
    }
  });
  Object.keys(byLoc).forEach(function(loc){
    var _se=Object.assign({date:date,signDate:signDate},byLoc[loc]);
    if(!_se.clientCid){var _sfi=findCIdxByLoc(_se.loc);if(_sfi>=0&&C[_sfi])_se.clientCid=C[_sfi].cid;}
    SIGN.push(_se);
  });
  svSign();
}

function findCIdxByLoc(loc){
  var parts=loc.split(" － ");var la=parts[0]||"";var lp=(parts.slice(1).join(" － "))||"";
  for(var i=0;i<C.length;i++){
    var cc=C[i];var ca=cc.alias||cc.con||"";
    if(cc.taxId&&cc.taxId===la&&(cc.proj||"")===lp)return i;
    if((ca+" － "+(cc.proj||""))===loc)return i;
    if(((cc.con||"")+" － "+(cc.proj||""))===loc)return i;
    if((ca===la||(cc.con||"")===la)&&(cc.proj||"")===lp)return i;
  }
  return -1;
}

function pgSign(){
  var act=document.getElementById("pact");act.innerHTML="";
  var pg=document.getElementById("pg");
  pg.innerHTML="<div id='signModal'></div>";

  /* Build data: group SIGN entries by clientIdx */
  /* Also read from INV rows as source of truth for confirmed data */
  /* Primary: use SIGN DB; supplement with INV */
  
  /* Get active clients */
  var activeClients=[];
  for(var i=0;i<C.length;i++){
    if(!C[i].status||C[i].status==="active")activeClients.push(i);
  }

  if(!activeClients.length&&!SIGN.length){
    var emp=document.createElement("div");emp.className="card";
    emp.innerHTML="<div class='ct'>DB6 簽單</div><p class='muted'>尚無進行中客戶，請先在客戶資料夾新增</p>";
    pg.insertBefore(emp,pg.firstChild);return;
  }

  /* For each active client, gather sign entries from SIGN DB */
  activeClients.forEach(function(ci){
    var cc=C[ci];
    var clientLabel=(cc.alias||cc.con||"")+(cc.proj?" － "+cc.proj:"");
    
    /* Get all SIGN entries for this client */
    var signRows=SIGN.filter(function(e){
      if(e.clientCid!==undefined&&C[ci])return e.clientCid===C[ci].cid;
      return e.clientIdx===ci;
    });
    
    /* Also get from INV */
    var invRec=null;
    for(var j=0;j<INV.length;j++){
      var _ii=INV[j];
      if(_ii.clientCid!==undefined&&C[ci]&&_ii.clientCid===C[ci].cid){invRec=_ii;break;}
      if(!invRec&&_ii.clientIdx===ci)invRec=_ii;
    }
    
    /* Merge: build date→row map */
    var dateMap={};
    
    /* From SIGN */
    signRows.forEach(function(e){
      var dt=e.signDate||e.date; /* use signDate for display */
      var workDt=e.date; /* original work date */
      if(!dateMap[dt])dateMap[dt]={rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0,confirmed:false,workDate:workDt};
      (e.entries||[]).forEach(function(en){
        if(!en.confirmed)return;
        dateMap[dt].confirmed=true;
        if(en.type==="rough"){dateMap[dt].rough+=en.count;dateMap[dt].roughOT+=en.overtime||0;}
        else if(en.type==="stone"){dateMap[dt].stone+=en.count;dateMap[dt].stoneOT+=en.overtime||0;}
        else if(en.type==="tech"){dateMap[dt].tech+=en.count;dateMap[dt].techOT+=en.overtime||0;}
      });
    });
    
    /* From INV rows (authoritative) */
    if(invRec){
      (invRec.rows||[]).forEach(function(r){
        var dt=r.date;
        if(!dateMap[dt])dateMap[dt]={rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0,confirmed:true};
        dateMap[dt].rough=r.rough||0;dateMap[dt].roughOT=r.roughOT||0;
        dateMap[dt].stone=r.stone||0;dateMap[dt].stoneOT=r.stoneOT||0;
        dateMap[dt].tech=r.tech||0;dateMap[dt].techOT=r.techOT||0;
        dateMap[dt].confirmed=true;
      });
    }
    
    if(!Object.keys(dateMap).length)return; /* no data, skip this client */

    var card=document.createElement("div");card.className="card";card.style.marginBottom="16px";
    
    /* Client header */
    var _bodyDivRef={el:null}; /* forward ref */
    var cardHdr=document.createElement("div");
    cardHdr.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;cursor:pointer;padding:4px 0;";
    cardHdr.addEventListener("click",function(e){

function getOwedSignDates(idNo){
  var wname=getName(idNo);
  var today=rocToday2();
  var todayKey=rocDateInt(today);
  var paidDates=[];
  var hasAdvance=false;
  SAL.forEach(function(rec){
    (rec.records||[]).forEach(function(r){
      if(r.name===idNo||r.name===wname||r.idNo===idNo){
        if(rec.payDate&&rocDateInt(rec.payDate)>todayKey) hasAdvance=true;
        (r.dates||[]).forEach(function(d){
          if(paidDates.indexOf(d.date)<0) paidDates.push(d.date);
        });
      }
    });
  });
  if(!paidDates.length) return {owed:[],advance:hasAdvance};
  var signedConfirmed={};
  SIGN.forEach(function(e){
    (e.entries||[]).forEach(function(en){
      if((en.idNo===idNo||en.name===wname)&&en.confirmed)
        signedConfirmed[e.date]=true;
    });
  });
  var owedDates=paidDates.filter(function(dt){return !signedConfirmed[dt];});
  owedDates.sort(function(a,b){return rocDateInt(a)-rocDateInt(b);});
  return {owed:owedDates,advance:hasAdvance};
}

function getClientByCid(cid){
  if(cid===undefined||cid===null||cid==="")return null;
  for(var i=0;i<C.length;i++){if(C[i].cid===cid||C[i].cid===+cid)return C[i];}
  return null;
}
function getClientLabel(cid){
  var cc=getClientByCid(cid);
  if(!cc)return String(cid);
  return (cc.alias||cc.con||"")+(cc.proj?" － "+cc.proj:"");
}

function migrateATT(){
  /* Move ATT[w.id] to ATT[w.idNo], remove old key */
  var changed=false;
  W.forEach(function(w){
    if(!w.idNo)return;
    if(ATT[w.id]!==undefined&&ATT[w.idNo]===undefined){
      ATT[w.idNo]=ATT[w.id];
      delete ATT[w.id];
      changed=true;
    } else if(ATT[w.id]!==undefined&&ATT[w.idNo]!==undefined){
      /* Both exist: OR them, prefer true, remove old */
      ATT[w.idNo]=ATT[w.idNo]||ATT[w.id];
      delete ATT[w.id];
      changed=true;
    }
  });
  if(changed)sv("attendance",ATT);
}

function migrateQSEED(){
  var changed=false;
  QSEED.forEach(function(q,i){
    if(!q.qid){q.qid=i+1;changed=true;}
    if(!q.clientCid){
      for(var j=0;j<C.length;j++){
        if(C[j].con===q.clientName&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
        if(C[j].taxId&&C[j].taxId===q.taxId&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
      }
    }
  });
  Q.forEach(function(q,i){
    if(!q.qid){q.qid=i+1;changed=true;}
    if(!q.clientCid){
      for(var j=0;j<C.length;j++){
        if(C[j].con===q.clientName&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
      }
    }
  });
  if(changed)sv("quotes",Q);
}

  var h="<div class='card'><div class='ct'>客戶資料夾（"+C.length+"筆）</div><div id='cTabBar'></div>";
  h+=list.length?"<div class='tbl-wrap' style='margin-top:10px;'><table><thead><tr><th style='width:44px;text-align:center;'>No.</th><th>報價公司</th><th>廠商</th><th>簡稱</th><th>案名</th><th>狀態</th><th>點工(/工)</th><th>點工加班(/時)</th><th>技術工(/工)</th><th>技術工加班(/時)</th><th>打石工(/工)</th><th>打石工加班(/時)</th><th></th></tr></thead><tbody>"+rows+"</tbody></table></div>":"<p class='muted' style='margin-top:12px;'>此分類無客戶</p>";
  h+="</div><div id='cmodal'></div>";
  document.getElementById("pg").innerHTML=h;
  document.getElementById("cTabBar").appendChild(tabBar);
  document.querySelectorAll("[data-a]").forEach(function(b){
    b.addEventListener("click",function(){
      var i=parseInt(this.dataset.i);
      if(this.dataset.a==="e")openCF(i);else if(this.dataset.a==="inv")openInvForClient(i);else delC(i);
    });
  });
}

function openCF(idx){
  var c=idx!==undefined?C[idx]:{co:"luten",con:"",proj:"",taxId:"",attn:"",tel:"",p1:2000,p2:333,p3:2600,p4:432,p5:3100,p6:515,status:"active"};
  var cm=document.getElementById("cmodal");
  var ov=document.createElement("div");ov.className="ov";ov.style.alignItems="flex-start";ov.style.overflowY="auto";
  var box=document.createElement("div");box.className="mod";box.style.cssText="max-width:520px;margin:20px auto;";
  var clientOpts="<option value='luten'"+(c.co==="luten"?" selected":"")+">壚騰有限公司</option><option value='shenghua'"+(c.co==="shenghua"?" selected":"")+">陞驊實業有限公司</option>";
  box.innerHTML=
    "<div class='ct'>"+(idx!==undefined?"編輯":"新增")+"客戶</div>"+
    "<div class='fg'><div class='fl'><label>報價公司</label><select id='cco'>"+clientOpts+"</select></div>"+
    "<div class='fl'><label>工地狀態</label><div style='display:flex;gap:6px;margin-top:4px;'>"+
    "<button type='button' class='btn bsm' id='cst_active' onclick='setCStatus(\"active\")' style='flex:1;'>🔨 進行中</button>"+
    "<button type='button' class='btn bsm' id='cst_done' onclick='setCStatus(\"done\")' style='flex:1;'>✅ 完工</button>"+
    "<button type='button' class='btn bsm' id='cst_pending' onclick='setCStatus(\"pending\")' style='flex:1;'>⏸ 未開始</button>"+
    "<button type='button' class='btn bsm' id='cst_hold' onclick='setCStatus(\"hold\")' style='flex:1;'>🔇 暫時未叫</button>"+
    "</div><input type='hidden' id='cstatus' value='"+(c.status||"active")+"'></div>"+
    "<div class='fl'><label>廠商（公司名稱）</label><input id='cc' oninput='syncAlias(this)' value='"+ea(c.con||"")+"' placeholder='例：耕建築股份有限公司'></div>"+
    "<div class='fl'><label>簡稱（顯示用）</label><input id='calias' oninput='this.dataset.edited=1' value='"+ea(c.alias||c.con||"")+"' placeholder='可自訂簡稱'></div>"+
    "<div class='fl'><label>案名（工地名稱）</label><input id='cp' value='"+ea(c.proj||"")+"' placeholder='例：耕心冉冉'></div>"+
    "</div><div class='fg f2'><div class='fl'><label>統一編號</label><input id='ctx' value='"+ea(c.taxId||"")+"'></div><div class='fl'><label>ATTN</label><input id='cat' value='"+ea(c.attn||"")+"'></div><div class='fl'><label>TEL</label><input id='ctl' value='"+ea(c.tel||"")+"'></div></div>"+
    "<div class='hr'></div><p style='font-size:11px;color:var(--mut);margin-bottom:10px;'>費用設定（未含稅，元）</p>"+
    "<div class='fg f2'><div class='fl'><label>點工費用（/工）</label><input id='c1' type='number' value='"+(c.p1||0)+"'></div><div class='fl'><label>點工加班費用（/時）</label><input id='c2' type='number' value='"+(c.p2||0)+"'></div><div class='fl'><label>技術工費用（/工）</label><input id='c3' type='number' value='"+(c.p3||0)+"'></div><div class='fl'><label>技術工加班費用（/時）</label><input id='c4' type='number' value='"+(c.p4||0)+"'></div><div class='fl'><label>打石工費用（/工）</label><input id='c5' type='number' value='"+(c.p5||0)+"'></div><div class='fl'><label>打石工加班費用（/時）</label><input id='c6' type='number' value='"+(c.p6||0)+"'></div></div>"+
    "<div class='mr'><button class='btn bp' id='cok'>儲存</button><button class='btn bs' id='ccx'>取消</button></div>";
  ov.appendChild(box);cm.innerHTML="";cm.appendChild(ov);
  document.getElementById("cok").addEventListener("click",function(){saveC(idx);});
  document.getElementById("ccx").addEventListener("click",function(){cm.innerHTML="";});
  setCStatus(c.status||"active");
}

function saveC(idx){
  var g=function(id){return parseFloat(document.getElementById(id).value)||0;};
  var statusEl=document.getElementById("cstatus");
  var aliasEl=document.getElementById("calias");
  var o={
    cid:(idx!==undefined&&C[idx]&&C[idx].cid)?C[idx].cid:(function(){
      var mx=0;C.forEach(function(cl){if(cl.cid&&cl.cid>mx)mx=cl.cid;});return mx+1;
    })(),
    co:document.getElementById("cco").value,
    con:document.getElementById("cc").value.trim(),
    alias:aliasEl?aliasEl.value.trim():"",
    proj:document.getElementById("cp").value.trim(),
    taxId:(document.getElementById("ctx")||{value:""}).value.trim(),
    attn:(document.getElementById("cat")||{value:""}).value.trim(),
    tel:(document.getElementById("ctl")||{value:""}).value.trim(),
    p1:g("c1"),p2:g("c2"),p3:g("c3"),p4:g("c4"),p5:g("c5"),p6:g("c6"),
    status:statusEl?statusEl.value:"active"
  };
  if(!o.alias)o.alias=o.con;
  if(!o.con||!o.proj){alert("請填寫廠商名稱和案名");return;}
  /* Duplicate check */
  var dupExists=C.some(function(cl,di){
    return di!==(idx!==undefined?idx:-1)&&cl.con===o.con&&cl.proj===o.proj;
  });
  o.isDup=dupExists;
  if(dupExists)alert("⚠ 廠商「"+o.con+"」+案名「"+o.proj+"」 已存在，將標註這筆為重複記錄");
  if(idx!==undefined)C[idx]=o;else C.push(o);
  sv("clients",C);document.getElementById("cmodal").innerHTML="";pgC();
}

function delC(i){if(!confirm("確定刪除？"))return;C.splice(i,1);sv("clients",C);pgC();}


function openD(editIdx){
  var existing=(editIdx!==undefined&&DT[editIdx])?DT[editIdx]:null;

  /* available workers from ATT (current 上班表) */
  var roughAvail=W.filter(function(w){return w.category==="粗工"&&(ATT[w.idNo]||ATT[w.id]);});
  var stoneAvail=W.filter(function(w){return w.category==="打石工"&&(ATT[w.idNo]||ATT[w.id]);});
  window._dRoughAvail=roughAvail;
  window._dStoneAvail=stoneAvail;

  /* init dRows */
  if(existing){
    dRows=[{
      locIdx:findLocIdx(existing.loc),
      roughNames:(existing.roughNames||[]).slice(),
      stoneNames:(existing.stoneNames||[]).slice(),
      note:existing.note||""
    }];
  } else {
    dRows=[makeEmptyRow()];
  }

  var dm=document.getElementById("dmodal");
  var ov=document.createElement("div"); ov.className="ov"; ov.style.alignItems="flex-start"; ov.style.overflowY="auto";
  var box=document.createElement("div"); box.className="mod"; box.style.cssText="max-width:700px;margin:20px auto;";
  box.innerHTML=
    "<div style='position:sticky;top:0;background:var(--s1);z-index:10;padding-bottom:10px;border-bottom:1px solid var(--bdr);margin-bottom:14px;'>"+
    "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;'>"+
    "<span class='ct' style='margin-bottom:0;'>"+(existing?"修改出工記錄":"新增出工表")+"</span>"+
    "<div style='display:flex;gap:6px;'><button class='btn bp bsm' id='d_save'>"+(existing?"更新出工表":"儲存出工表")+"</button><button class='btn bs bsm' id='d_cancel'>取消</button></div></div>"+
    "<div style='display:flex;align-items:center;gap:6px;'><button class='btn bs bsm' id='d_prev' type='button'>&#9664;</button>"+
    "<input id='d_date' onclick='openDateCal()' readonly value='"+(existing?esc(existing.date):rocToday2())+"' style='text-align:center;flex:1;font-family:DM Mono,monospace;font-weight:700;font-size:14px;cursor:pointer;'><button class='btn bs bsm' id='d_next' type='button'>&#9654;</button></div>"+
    "<div id='d_dateHint' style='font-size:11px;margin-top:5px;color:var(--mut);'></div><div id='d_calPop'></div></div>"+
    "<div id='d_rowsWrap'></div>"+
    (existing?"":"<button class='btn bs bsm' id='d_addRow' style='margin-bottom:14px;'>+ 新增地點</button>")

  ov.appendChild(box); dm.innerHTML=""; dm.appendChild(ov);
  renderDRows();

  if(!existing){
    document.getElementById("d_addRow").addEventListener("click",function(){
      dRows.push(makeEmptyRow()); renderDRows();
    });
  }

  /* date navigator */
  var dPrev=document.getElementById("d_prev");
  var dNext=document.getElementById("d_next");
  var dDate=document.getElementById("d_date");
  if(dPrev&&dNext&&dDate){
    updateHint(dDate.value);
    if(!existing) autoLoadPrev(dDate.value,false);
    dPrev.addEventListener("click",function(){
      dDate.value=rocAddDays(dDate.value,-1);
      updateHint(dDate.value); autoLoadPrev(dDate.value,!!existing);
    });
    dNext.addEventListener("click",function(){
      dDate.value=rocAddDays(dDate.value,1);
      updateHint(dDate.value); autoLoadPrev(dDate.value,!!existing);
    });
    dDate.addEventListener("change",function(){
      updateHint(this.value); autoLoadPrev(this.value,!!existing);
    });
  }

  document.getElementById("d_save").addEventListener("click",function(){saveD(editIdx);});
  document.getElementById("d_cancel").addEventListener("click",function(){dm.innerHTML="";});
}

function renderDRows(){
  var roughAvail=window._dRoughAvail||[];
  var stoneAvail=window._dStoneAvail||[];
  var wrap=document.getElementById("d_rowsWrap"); if(!wrap) return;
  wrap.innerHTML="";

  dRows.forEach(function(row,ri){
    var div=document.createElement("div");
    div.style.cssText="background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:14px;margin-bottom:10px;";

    /* header: 地點 N + remove btn */
    var hdr=document.createElement("div"); hdr.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;";
    var lbl=document.createElement("span"); lbl.style.cssText="font-size:12px;font-weight:700;color:var(--acc);"; lbl.textContent="地點 "+(ri+1);
    hdr.appendChild(lbl);
    if(dRows.length>1){
      var rm=document.createElement("button"); rm.className="btn bd bsm"; rm.textContent="移除";
      (function(r){rm.addEventListener("click",function(){dRows.splice(r,1);renderDRows();});})(ri);
      hdr.appendChild(rm);
    }
    div.appendChild(hdr);

    /* loc select */
    var locWrap=document.createElement("div"); locWrap.className="fl"; locWrap.style.marginBottom="12px";
    var locLabel=document.createElement("label"); locLabel.textContent="地點（由客戶資料夾帶入）"; locLabel.style.fontSize="11px";
    var locSel=document.createElement("select"); locSel.id="d_loc_"+ri;
    locSel.style.cssText="background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:7px 9px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;width:100%;";
    locSel.innerHTML=buildClientOpts(row.locIdx);
    (function(r){locSel.addEventListener("change",function(){dRows[r].locIdx=this.value;});})(ri);
    locWrap.appendChild(locLabel); locWrap.appendChild(locSel); div.appendChild(locWrap);

    /* worker pills: 粗工 section */
    if(roughAvail.length){
      var rSec=document.createElement("div"); rSec.style.marginBottom="10px";
      var rTitle=document.createElement("div"); rTitle.style.cssText="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;"; rTitle.textContent="🔵 粗工（點選出工人員）";
      rSec.appendChild(rTitle);
      var rGrid=document.createElement("div"); rGrid.style.cssText="display:flex;flex-wrap:wrap;gap:6px;";
      roughAvail.forEach(function(w){
        /* collect names used by OTHER rows */
        var usedByOthers=[];
        dRows.forEach(function(r2,r2i){if(r2i!==ri)(r2.roughNames||[]).forEach(function(n){if(n&&usedByOthers.indexOf(n)<0)usedByOthers.push(n);});});
        var wId=w.idNo||w.name;var isSel=(row.roughNames||[]).indexOf(wId)>=0;
        var isUsed=!isSel&&(usedByOthers.indexOf(w.name)>=0||usedByOthers.indexOf(w.idNo||"")>=0);
        if(isUsed) return; /* hide if used in another row */
        var pill=document.createElement("div");
        pill.style.cssText="padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:.12s;border:2px solid "+
          (isSel?"var(--acc)":"var(--bdr)")+";background:"+(isSel?"rgba(240,180,41,.18)":"var(--s2)")+";color:"+(isSel?"var(--acc)":"var(--txt)")+";";
        pill.textContent=(isSel?"✓ ":"")+w.name;
        (function(name,r){
          pill.addEventListener("click",function(){
            var arr=dRows[r].roughNames||(dRows[r].roughNames=[]);
            var idx=arr.indexOf(name);
            if(idx>=0) arr.splice(idx,1); else arr.push(name);
            renderDRows();
          });
        })(wId,ri);
        rGrid.appendChild(pill);
      });
      rSec.appendChild(rGrid); div.appendChild(rSec);
    }

    /* worker pills: 打石工 section */
    if(stoneAvail.length){
      var sSec=document.createElement("div"); sSec.style.marginBottom="10px";
      var sTitle=document.createElement("div"); sTitle.style.cssText="font-size:11px;font-weight:700;color:var(--purple);margin-bottom:6px;"; sTitle.textContent="🟣 打石工（點選出工人員）";
      sSec.appendChild(sTitle);
      var sGrid=document.createElement("div"); sGrid.style.cssText="display:flex;flex-wrap:wrap;gap:6px;";
      stoneAvail.forEach(function(w){
        var usedByOthers=[];
        dRows.forEach(function(r2,r2i){if(r2i!==ri)(r2.stoneNames||[]).forEach(function(n){if(n&&usedByOthers.indexOf(n)<0)usedByOthers.push(n);});});
        var wId=w.idNo||w.name;var isSel=(row.stoneNames||[]).indexOf(wId)>=0;
        var isUsed=!isSel&&usedByOthers.indexOf(w.name)>=0;
        if(isUsed) return;
        var pill=document.createElement("div");
        pill.style.cssText="padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:.12s;border:2px solid "+
          (isSel?"var(--purple)":"var(--bdr)")+";background:"+(isSel?"rgba(188,140,255,.15)":"var(--bg)")+";color:"+(isSel?"var(--purple)":"var(--txt)")+";";
        pill.textContent=(isSel?"✓ ":"")+w.name;
        (function(name,r){
          pill.addEventListener("click",function(){
            var arr=dRows[r].stoneNames||(dRows[r].stoneNames=[]);
            var idx=arr.indexOf(name);
            if(idx>=0) arr.splice(idx,1); else arr.push(name);
            renderDRows();
          });
        })(wId,ri);
        sGrid.appendChild(pill);
      });
      sSec.appendChild(sGrid); div.appendChild(sSec);
    }

    /* no workers available */
    if(!roughAvail.length&&!stoneAvail.length){
      var noW=document.createElement("div"); noW.style.cssText="font-size:12px;color:var(--mut);padding:8px 0;";
      noW.textContent="當前可上班表無人員，請先在員工名冊勾選上班人員";
      div.appendChild(noW);
    }

    /* selected summary */
    var rSel=(row.roughNames||[]).filter(function(n){return n;});
    var sSel=(row.stoneNames||[]).filter(function(n){return n;});
    if(rSel.length||sSel.length){
      var sumDiv=document.createElement("div"); sumDiv.style.cssText="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:6px;font-size:12px;";
      if(rSel.length) sumDiv.innerHTML+="<span style='color:var(--blue);font-weight:700;'>粗工：</span>"+esc(rSel.join("、"))+"　";
      if(sSel.length) sumDiv.innerHTML+="<span style='color:var(--purple);font-weight:700;'>打石工：</span>"+esc(sSel.join("、"));
      div.appendChild(sumDiv);
    }

    /* note */
    var noteWrap=document.createElement("div"); noteWrap.className="fl"; noteWrap.style.marginTop="8px";
    var noteLabel=document.createElement("label"); noteLabel.textContent="備註"; noteLabel.style.fontSize="11px";
    var noteInp=document.createElement("input"); noteInp.id="d_note_"+ri; noteInp.value=row.note||""; noteInp.placeholder="備註（選填）";
    noteInp.style.cssText="background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:7px 9px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;width:100%;";
    (function(r){noteInp.addEventListener("input",function(){dRows[r].note=this.value;});})(ri);
    noteWrap.appendChild(noteLabel); noteWrap.appendChild(noteInp); div.appendChild(noteWrap);
    wrap.appendChild(div);
  });
}

function saveD(editIdx){
  var date=document.getElementById("d_date").value.trim();
  if(!date){alert("請填寫日期");return;}

  /* collect note values */
  dRows.forEach(function(row,ri){
    var nEl=document.getElementById("d_note_"+ri); if(nEl) row.note=nEl.value.trim();
    var lEl=document.getElementById("d_loc_"+ri); if(lEl) row.locIdx=lEl.value;
  });

  if(editIdx!==undefined){
    /* single-row edit */
    var row=dRows[0];
    var loc="";
    if(row.locIdx!==""&&C[parseInt(row.locIdx)]){var c=C[parseInt(row.locIdx)];loc=(c.alias||c.con||"")+" － "+(c.proj||"");}
    if(!loc&&DT[editIdx]) loc=DT[editIdx].loc;
    if(!loc){alert("請選擇地點");return;}
    var rSel=(row.roughNames||[]).filter(function(n){return n;});
    var sSel=(row.stoneNames||[]).filter(function(n){return n;});
    DT[editIdx]={date:date,loc:loc,roughCount:rSel.length,roughNames:rSel,stoneCount:sSel.length,stoneNames:sSel,note:row.note};
  } else {
    /* multiple rows */
    var hasLoc=dRows.some(function(r){return r.locIdx!==""||r.roughNames.length||r.stoneNames.length;});
    if(!hasLoc){alert("請至少選擇一個地點或人員");return;}
    dRows.forEach(function(row){
      if(row.locIdx===""&&!row.roughNames.length&&!row.stoneNames.length) return;
      var loc=""; var rSel=(row.roughNames||[]).filter(function(n){return n;}); var sSel=(row.stoneNames||[]).filter(function(n){return n;});
      var _ci2=parseInt(row.locIdx);var _cid2=undefined;
      if(row.locIdx!==""&&C[_ci2]){
        var _c2=C[_ci2];_cid2=_c2.cid;
        loc=getClientLabel(_cid2)||(_c2.alias||_c2.con||"")+" － "+(_c2.proj||"");
      }
      /* P1: Remove existing record with same date+clientCid before pushing */
      if(_cid2!==undefined){
        DT=DT.filter(function(e){return !(e.date===date&&e.clientCid===_cid2);});
      }
      DT.unshift({date:date,loc:loc||"（未選地點）",clientCid:_cid2,roughCount:rSel.length,roughNames:rSel,stoneCount:sSel.length,stoneNames:sSel,note:row.note});
    });
  }
  sv("dispatch",DT);
  document.getElementById("dmodal").innerHTML="";
  pgD();
}
</script>
