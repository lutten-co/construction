/* Firebase Realtime Database REST API - no preflight CORS */
(function(){
  var DB="https://lutten-co-default-rtdb.asia-southeast1.firebasedatabase.app";

  /* READ: simple GET, no preflight */
  function fbGet(path){
    return fetch(DB+"/cg/"+path+".json")
      .then(function(r){return r.json();});
  }

  /* WRITE: use XMLHttpRequest to avoid preflight CORS */
  function fbPut(path,data){
    return new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.open("PUT",DB+"/cg/"+path+".json",true);
      xhr.setRequestHeader("Content-Type","application/json");
      xhr.onload=function(){resolve(xhr.responseText);};
      xhr.onerror=function(){reject(new Error("XHR error"));};
      xhr.send(JSON.stringify(data));
    });
  }

  window.fbSv=function(k,v){
    fbPut(k,v).catch(function(e){console.warn("FB write",k,e.message);});
  };

  window.fbSync=function(keys,cb){
    var left=keys.length;
    if(!left){cb();return;}
    keys.forEach(function(k){
      var _done=false;
      var _t=setTimeout(function(){
        if(!_done){_done=true;if(--left===0)cb();}
      },6000);
      fbGet(k).then(function(data){
        if(!_done){_done=true;clearTimeout(_t);
          if(data!==null&&data!==undefined)
            try{localStorage.setItem("cg_"+k,JSON.stringify(data));}catch(e){}
          if(--left===0)cb();
        }
      }).catch(function(e){
        if(!_done){_done=true;clearTimeout(_t);
          console.warn("FB err",k,e.message);
          if(--left===0)cb();}
      });
    });
  };

  window.fbReady=true;
  console.log("Firebase REST ready");
})();
</script>

/* ── Date helpers ── */
function rocDateInt(s){var m=s?s.match(/(\d+)年(\d+)月(\d+)日/):null;return m?+m[1]*10000+ +m[2]*100+ +m[3]:0;}
function rocAddDays(s,delta){var m=s?s.match(/(\d+)年(\d+)月(\d+)日/):null;if(!m)return s;var d=new Date(+m[1]+1911,+m[2]-1,+m[3]);d.setDate(d.getDate()+delta);return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function rocToday2(){var d=new Date();return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function getSortedDates(){var dates=[];DT.forEach(function(d){if(d.date&&dates.indexOf(d.date)<0)dates.push(d.date);});return dates.sort(function(a,b){return rocDateInt(b)-rocDateInt(a);});}
function updateHint(dt){var hint=document.getElementById("d_dateHint");if(!hint)return;var same=DT.filter(function(d){return d.date===dt;});var sorted=getSortedDates();var prev=null;for(var k=0;k<sorted.length;k++){if(rocDateInt(sorted[k])<rocDateInt(dt)){prev=sorted[k];break;}}if(same.length){hint.style.color="var(--green)";hint.textContent="此日已有"+same.length+"筆出工記錄";}else{hint.style.color="var(--mut)";hint.textContent=prev?"前一期："+prev+" — 可自動帶入":"";}  }
function autoLoadPrev(dt,isEdit){if(isEdit)return;var sorted=getSortedDates();var prev=null;for(var k=0;k<sorted.length;k++){if(rocDateInt(sorted[k])<rocDateInt(dt)){prev=sorted[k];break;}}if(!prev){dRows=[makeEmptyRow()];renderDRows();return;}var prevEntries=DT.filter(function(d){return d.date===prev;});dRows=prevEntries.map(function(d){return{locIdx:findLocIdx(d.loc),roughNames:[],stoneNames:[],note:d.note||""};});if(!dRows.length)dRows=[makeEmptyRow()];renderDRows();}

function calcInsPreview(dt){
  var el=document.getElementById("insCalc");if(!el||!dt)return;
  var todayWorkers=getDayNames(dt);var dormNames=getDormNames();
  var prevDt=getPrevDate(dt);
  var prevInsRec=prevDt?INS.filter(function(r){return r.date===prevDt;})[0]:null;
  var prevTotal=prevInsRec?prevInsRec.total:[];
  var rmNames=prevTotal.filter(function(n){return todayWorkers.indexOf(n)<0&&dormNames.indexOf(n)<0;});
  var totalNames=prevTotal.slice();
  todayWorkers.forEach(function(n){if(totalNames.indexOf(n)<0)totalNames.push(n);});
  dormNames.forEach(function(n){if(totalNames.indexOf(n)<0)totalNames.push(n);});
  totalNames=totalNames.filter(function(n){return rmNames.indexOf(n)<0;});
  var addNames=totalNames.filter(function(n){return prevTotal.indexOf(n)<0;});
  window._insCalcData={dt:dt,total:totalNames,add:addNames,remove:rmNames};
  function chips(list,color,bg){if(!list.length)return "<div style='font-size:12px;color:var(--mut);'>無</div>";return list.map(function(n){return "<div style='padding:4px 8px;background:"+bg+";border-radius:5px;margin-bottom:3px;font-size:13px;font-weight:600;color:"+color+";'>"+esc(n)+"</div>";}).join("");}
  var prevNote=prevDt?(prevInsRec?"前日："+prevDt+"（已有名單）":"前日："+prevDt+"（尚未建立名單，以出工記錄推算）"):"無前日出工記錄，當日出工＋宿舍名冊全部加保";
  el.innerHTML="<div style='font-size:11px;color:var(--mut);margin-bottom:10px;padding:6px 10px;background:var(--s2);border-radius:6px;'>"+esc(prevNote)+"</div>"+
    "<div style='display:grid;grid-template-columns:1fr 1fr;gap:12px;'>"+
    "<div style='background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:12px;'><div style='font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px;'>📋 當日總名單（"+totalNames.length+"人）</div><div style='font-size:10px;color:var(--mut);margin-bottom:8px;'>前日名單＋今日出工＋宿舍－退保</div>"+chips(totalNames,"var(--txt)","rgba(88,166,255,.08)")+"</div>"+
    "<div style='display:flex;flex-direction:column;gap:10px;'>"+
    "<div style='background:var(--s2);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:12px;'><div style='font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px;'>✚ 需加保（"+addNames.length+"人）</div><div style='font-size:10px;color:var(--mut);margin-bottom:6px;'>不在前日總名單，今日出工或在宿舍</div>"+chips(addNames,"var(--green)","rgba(63,185,80,.1)")+"</div>"+
    "<div style='background:var(--s2);border:1px solid rgba(248,81,73,.3);border-radius:8px;padding:12px;'><div style='font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px;'>✖ 需退保（"+rmNames.length+"人）</div><div style='font-size:10px;color:var(--mut);margin-bottom:6px;'>在前日總名單，今日未出工且不在宿舍</div>"+chips(rmNames,"var(--red)","rgba(248,81,73,.1)")+"</div>"+
    "</div></div>";
}

    status:statusEl?statusEl.value:"active"

  if(!o.alias)o.alias=o.con;
  if(!o.con||!o.proj){alert("請填寫廠商名稱和案名");return;}

}

function makeEmptyRow(){return {locIdx:"",roughNames:[],stoneNames:[],note:""};}

function findLocIdx(loc){
  if(loc===undefined||loc===null||loc==="")return "";
  /* Numeric = cid lookup */
  if(String(loc).match(/^\d+$/)&&!isNaN(+loc)){
    for(var j=0;j<C.length;j++){if(C[j].cid===+loc)return String(j);}
    return "";
  }
  var parts=loc.split(" － ");var la=parts[0]||"";var lp=(parts.slice(1).join(" － "))||"";
  for(var i=0;i<C.length;i++){
    var c=C[i];var ca=c.alias||c.con||"";
    if(c.taxId&&c.taxId===la&&(c.proj||"")===lp)return String(i);
    if((ca+" － "+(c.proj||""))===loc)return String(i);
    if(((c.con||"")+" － "+(c.proj||""))===loc)return String(i);
  }
  return "";
}

function buildClientOpts(selVal){
  var freq={};
  DT.forEach(function(d){var idx=findLocIdx(d.loc);if(idx!=="")freq[idx]=(freq[idx]||0)+1;});
  var indices=[];for(var i=0;i<C.length;i++)indices.push(i);
  indices.sort(function(a,b){return (freq[String(b)]||0)-(freq[String(a)]||0);});
  var o="<option value=''>— 選擇地點 —</option>";
  indices.forEach(function(i){
    var c=C[i];var label=(c.alias||c.con||"")+(c.proj?" － "+c.proj:"");
    var cnt=freq[String(i)]||0;var extra=cnt?" ("+cnt+"x)":"";
    o+="<option value='"+i+"'"+(String(i)===String(selVal)?" selected":"")+">"+esc(label)+extra+"</option>";
  });
  return o;
}

function saveD(editIdx){
  var date=document.getElementById("d_date").value.trim();
  if(!date){alert("請填寫日期");return;}

  /* collect note values */
  dRows.forEach(function(row,ri){
    var nEl=document.getElementById("d_note_"+ri); if(nEl) row.note=nEl.value.trim();
    var lEl=document.getElementById("d_loc_"+ri); if(lEl) row.locIdx=lEl.value;
  });

  if(editIdx!==undefined){
    /* single-row edit */
    var row=dRows[0];
    var loc="";
    if(row.locIdx!==""&&C[parseInt(row.locIdx)]){var c=C[parseInt(row.locIdx)];loc=(c.alias||c.con||"")+" － "+(c.proj||"");}
    if(!loc&&DT[editIdx]) loc=DT[editIdx].loc;
    if(!loc){alert("請選擇地點");return;}
    var rSel=(row.roughNames||[]).filter(function(n){return n;});
    var sSel=(row.stoneNames||[]).filter(function(n){return n;});
    DT[editIdx]={date:date,loc:loc,roughCount:rSel.length,roughNames:rSel,stoneCount:sSel.length,stoneNames:sSel,note:row.note};
  } else {
    /* multiple rows */
    var hasLoc=dRows.some(function(r){return r.locIdx!==""||r.roughNames.length||r.stoneNames.length;});
    if(!hasLoc){alert("請至少選擇一個地點或人員");return;}
    dRows.forEach(function(row){
      if(row.locIdx===""&&!row.roughNames.length&&!row.stoneNames.length) return;
      var loc=""; var rSel=(row.roughNames||[]).filter(function(n){return n;}); var sSel=(row.stoneNames||[]).filter(function(n){return n;});
      var _ci2=parseInt(row.locIdx);var _cid2=undefined;
      if(row.locIdx!==""&&C[_ci2]){
        var _c2=C[_ci2];_cid2=_c2.cid;
        loc=getClientLabel(_cid2)||(_c2.alias||_c2.con||"")+" － "+(_c2.proj||"");
      }
      /* P1: Remove existing record with same date+clientCid before pushing */
      if(_cid2!==undefined){
        DT=DT.filter(function(e){return !(e.date===date&&e.clientCid===_cid2);});
      }
      DT.unshift({date:date,loc:loc||"（未選地點）",clientCid:_cid2,roughCount:rSel.length,roughNames:rSel,stoneCount:sSel.length,stoneNames:sSel,note:row.note});
    });
  }
  sv("dispatch",DT);
  document.getElementById("dmodal").innerHTML="";
  pgD();
}

function delD(i){DT.splice(i,1);sv("dispatch",DT);pgD();}

function salRocToRoc(s){var m=s&&s.match(/(\d+)年(\d+)月(\d+)日/);return m?{y:+m[1],m:+m[2],d:+m[3]}:null;}
function salRocToKey(s){var p=salRocToRoc(s);return p?p.y*10000+p.m*100+p.d:0;}
function salKeyToRoc(k){var y=Math.floor(k/10000),m=Math.floor((k%10000)/100),d=k%100;return y+"年"+m+"月"+d+"日";}
function salRocNow(){var d=new Date();return (d.getFullYear()-1911)+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function salGetDefaultWage(name){var w=W.find(function(x){return x.name===name;});return w?w.wage||0:0;}
function salGetPeople(){
  var sortedDates=getSortedDates().slice(0,30);
  var people=[];
  sortedDates.forEach(function(dt){
    DT.filter(function(d){return d.date===dt;}).forEach(function(d){
      (d.roughNames||[]).concat(d.stoneNames||[]).forEach(function(n){
        if(n&&people.indexOf(n)<0) people.push(n);
      });
    });
  });
  return people;
}
function salDupCheck(payDate,workerName,dates){
  var dups=[];
  SAL.forEach(function(rec){
    if(rec.payDate===payDate) return;
    (rec.records||[]).forEach(function(wr){
      if(wr.name===workerName){
        (wr.dates||[]).forEach(function(de){
          if(dates.indexOf(de.date)>=0) dups.push({payDate:rec.payDate,date:de.date});
        });
      }
    });
  });
  return dups;
}

function weRenderCal(){
  var st=window._salWE;
  var yr=st._calYear; var mo=st._calMonth;
  var selKeys=st.dates.map(function(d){return salRocToKey(d.date);});
  var calDiv=document.getElementById("weCal"); if(!calDiv) return;
  calDiv.innerHTML="";

  /* nav */
  var nav=document.createElement("div"); nav.style.cssText="display:flex;align-items:center;gap:6px;margin-bottom:8px;";
  var pBtn=document.createElement("button"); pBtn.className="btn bs bsm"; pBtn.textContent="◀";
  pBtn.addEventListener("click",function(){st._calMonth--;if(st._calMonth<1){st._calMonth=12;st._calYear--;}weRenderCal();});
  var nBtn=document.createElement("button"); nBtn.className="btn bs bsm"; nBtn.textContent="▶";
  nBtn.addEventListener("click",function(){st._calMonth++;if(st._calMonth>12){st._calMonth=1;st._calYear++;}weRenderCal();});
  var lbl=document.createElement("span"); lbl.style.cssText="flex:1;text-align:center;font-size:13px;font-weight:700;"; lbl.textContent=yr+"年"+mo+"月";
  nav.appendChild(pBtn); nav.appendChild(lbl); nav.appendChild(nBtn); calDiv.appendChild(nav);

  /* weekday headers */
  var grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;";
  ["日","一","二","三","四","五","六"].forEach(function(d){
    var h=document.createElement("div"); h.style.cssText="text-align:center;font-size:10px;color:var(--mut);padding:3px 0;"; h.textContent=d; grid.appendChild(h);
  });

  var adY=yr+1911;
  var firstDay=new Date(adY,mo-1,1).getDay();
  var daysInMo=new Date(adY,mo,0).getDate();
  for(var b=0;b<firstDay;b++) grid.appendChild(document.createElement("div"));
  for(var day=1;day<=daysInMo;day++){
    var key=yr*10000+mo*100+day;
    var isSel=selKeys.indexOf(key)>=0;
    var cell=document.createElement("div");
    cell.style.cssText="text-align:center;padding:6px 2px;border-radius:5px;cursor:pointer;font-size:12px;transition:.1s;"+
      (isSel?"background:var(--acc);color:#000;font-weight:700;":"background:var(--s2);color:var(--txt);");
    cell.textContent=day;
    (function(k){
      cell.addEventListener("click",function(){
        var idx=st.dates.findIndex(function(d){return salRocToKey(d.date)===k;});
        if(idx>=0) st.dates.splice(idx,1);
        else{st.dates.push({date:salKeyToRoc(k),wage:st._defWage,overtime:0});st.dates.sort(function(a,b){return salRocToKey(a.date)-salRocToKey(b.date);});}
        weRenderCal(); weRenderWageRows(); weCalcSum();
      });
    })(key);
    grid.appendChild(cell);
  }
  calDiv.appendChild(grid);

  /* selected summary */
  if(st.dates.length){
    var s=document.createElement("div"); s.style.cssText="font-size:11px;color:var(--green);margin-top:4px;";
    s.textContent="已選："+st.dates.length+"天　"+st.dates.map(function(d){return d.date;}).join("、");
    calDiv.appendChild(s);
  }
}

function weSave(){
  var st=window._salWE;
  /* sync latest input values */
  st.dates.forEach(function(d,i){
    d.wage=+((document.getElementById("weW_"+i)||{value:d.wage}).value)||0;

    name:st.name, idNo:getIdNo(st.name), _manual:st.isManual||false,
    dates:st.dates.slice(),
    mgmt:+(document.getElementById("weMgmt")||{value:0}).value||0,
    dorm:+(document.getElementById("weDorm")||{value:0}).value||0,
    loan:+(document.getElementById("weLoan")||{value:0}).value||0,
    note:(document.getElementById("weNote")||{value:""}).value.trim()

function pgInv(){
  var act=document.getElementById("pact");act.innerHTML="";
  var btn=document.createElement("button");btn.className="btn bp bsm";btn.textContent="\uff0b \u65b0\u589e\u8acb\u6b3e\u55ae";
  btn.addEventListener("click",function(){
    /* Default to first active client */
    var firstActive=C.find(function(cc){return !cc.status||cc.status==="active";});
    openInv(firstActive?firstActive.cid:undefined);
  });act.appendChild(btn);

  var pg=document.getElementById("pg");
  pg.innerHTML="<div id='invModal'></div>";

  if(!INV.length){
    var em=document.createElement("div");em.className="card";
    em.innerHTML="<div class='ct'>DB10 \u8acb\u6b3e\u55ae</div><p class='muted'>\u5c1a\u7121\u8acb\u6b3e\u55ae\uff0c\u9ede\u64ca\u4e0a\u65b9\u300c\u65b0\u589e\u8acb\u6b3e\u55ae\u300d</p>";
    pg.insertBefore(em,pg.firstChild);return;
  }

  /* Group by clientCid */
  var byClient={};
  INV.forEach(function(inv,i){
    var cid=inv.clientCid;
    /* Legacy fallback */
    if(!cid&&inv.clientIdx!==undefined){
      var cc2=C[inv.clientIdx];if(cc2)cid=cc2.cid;
    }
    if(!cid&&inv.clientKey){
      for(var k=0;k<C.length;k++){if((C[k].taxId||"")+"|"+(C[k].proj||"")===inv.clientKey){cid=C[k].cid;break;}}
    }
    var key=cid!==undefined?String(cid):"__";
    if(!byClient[key])byClient[key]=[];
    byClient[key].push({inv:inv,i:i,cid:cid});
  });

  Object.keys(byClient).sort().forEach(function(key){
    var recs=byClient[key];
    var firstCid=recs[0].cid;
    var cc=getClientByCid(firstCid)||{};
    var clientName=cc.con?(getClientLabel(firstCid)):"(\u672a\u77e5\u5ba2\u6236)";

    var card=document.createElement("div");card.className="card";card.style.marginBottom="16px";
    var cardH=document.createElement("div");cardH.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";
    var cttl=document.createElement("div");cttl.style.cssText="font-size:14px;font-weight:700;";cttl.textContent=clientName;
    var addBtn=document.createElement("button");addBtn.className="btn bs bsm";addBtn.textContent="\uff0b \u52a0\u4e00\u7b46";
    (function(cid2){addBtn.addEventListener("click",function(){openInv(cid2);});})(firstCid);
    cardH.appendChild(cttl);cardH.appendChild(addBtn);card.appendChild(cardH);

    recs.sort(function(a,b){return rocDateInt(b.inv.payDate)-rocDateInt(a.inv.payDate);}).forEach(function(rec){
      var inv=rec.inv;var ii=rec.i;
      var rowDiv=document.createElement("div");rowDiv.style.cssText="border:1px solid var(--bdr);border-radius:6px;padding:10px;margin-bottom:8px;";

      /* Header row */
      var invH=document.createElement("div");invH.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;";
      var meta=document.createElement("div");meta.style.cssText="font-size:12px;color:var(--mut);";
      var monthStr=inv.month||"";
      var rangeStr=(inv.rangeFrom&&inv.rangeTo)?(" \u300c"+inv.rangeFrom+"\u2013"+inv.rangeTo+"\u300d"):"";
      meta.textContent=monthStr+rangeStr+" | \u8acb\u6b3e\u65e5\uff1a"+inv.payDate+(inv.note?" | "+inv.note:"");
      var btnRow2=document.createElement("div");btnRow2.style.cssText="display:flex;gap:5px;";
      var editBtn=document.createElement("button");editBtn.className="btn bs bsm";editBtn.textContent="\u7de8\u8f2f";
      (function(ii2){editBtn.addEventListener("click",function(){openInv(undefined,ii2);});})(ii);
      var delBtn=document.createElement("button");delBtn.className="btn bd bsm";delBtn.textContent="\u522a\u9664";
      (function(ii2){delBtn.addEventListener("click",function(){if(confirm("\u78ba\u8a8d\u522a\u9664\uff1f")){INV.splice(ii2,1);sv("invoices",INV);pgInv();}});})(ii);
      btnRow2.appendChild(editBtn);btnRow2.appendChild(delBtn);
      invH.appendChild(meta);invH.appendChild(btnRow2);rowDiv.appendChild(invH);

      /* Rows table */
      if(inv.rows&&inv.rows.length){
        var tbl=document.createElement("table");tbl.style.cssText="width:100%;border-collapse:collapse;font-size:11px;";
        var thead=document.createElement("thead");
        var thRow=document.createElement("tr");
        ["\u65e5\u671f","\u7c97\u5de5","\u7c97\u5de5\u52a0\u73ed","\u6280\u8853\u5de5","\u6280\u8853\u5de5\u52a0\u73ed","\u6253\u77f3\u5de5","\u6253\u77f3\u5de5\u52a0\u73ed"].forEach(function(h,hi){

          th.style.cssText="padding:4px 6px;background:var(--s2);border-bottom:1px solid var(--bdr);text-align:"+(hi===0?"left":"center")+";color:var(--mut);font-size:10px;white-space:nowrap;";
          th.textContent=h;thRow.appendChild(th);
        });
        thead.appendChild(thRow);tbl.appendChild(thead);
        var tbody=document.createElement("tbody");
        inv.rows.sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);}).forEach(function(r){
          var tr=document.createElement("tr");
          var dm=r.date.match(/(\d+)\u6708(\d+)\u65e5/);
          var dtLabel=dm?(dm[1]+"/"+dm[2]):r.date;
          function mkTd(v,isDate){var td=document.createElement("td");td.style.cssText="padding:4px 6px;border-bottom:1px solid var(--bdr);text-align:"+(isDate?"left":"center")+";font-family:DM Mono,monospace;color:"+(v&&!isDate?"var(--txt)":"var(--mut)")+";";td.textContent=isDate?dtLabel:(v||"\u2014");tr.appendChild(td);}
          mkTd(dtLabel,true);mkTd(r.rough);mkTd(r.roughOT);mkTd(r.tech);mkTd(r.techOT);mkTd(r.stone);mkTd(r.stoneOT);
          tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);rowDiv.appendChild(tbl);
      }
      card.appendChild(rowDiv);
    });
    pg.insertBefore(card,pg.firstChild);
  });
}

function autoFillInvRows(clientCid,dateFrom,dateTo){
  var dtRows=getDTRowsForClient(clientCid,dateFrom,dateTo);
  /* Merge with SIGN data */
  window._invRows=[];
  var seenDates={};
  dtRows.forEach(function(d){
    if(seenDates[d.date])return;
    seenDates[d.date]=true;
    /* Get SIGN confirmed counts for this date+client */
    var rough=0,roughOT=0,stone=0,stoneOT=0,tech=0,techOT=0;
    SIGN.forEach(function(e){
      if(e.date!==d.date)return;
      var match=e.clientCid===clientCid;
      if(!match&&e.clientIdx>=0&&C[e.clientIdx])match=C[e.clientIdx].cid===clientCid;
      if(!match)return;
      (e.entries||[]).forEach(function(en){
        if(!en.confirmed)return;
        if(en.type==="rough"){rough+=en.count;roughOT+=en.overtime||0;}
        else if(en.type==="stone"){stone+=en.count;stoneOT+=en.overtime||0;}
        else if(en.type==="tech"){tech+=en.count;techOT+=en.overtime||0;}
      });
      /* Add buGong */
      if(e.buGong&&e.buGong.selected){
        rough+=e.buGong.rough||0;roughOT+=e.buGong.roughOT||0;
        tech+=e.buGong.tech||0;techOT+=e.buGong.techOT||0;
        stone+=e.buGong.stone||0;stoneOT+=e.buGong.stoneOT||0;
      }
    });
    /* Fallback to DT counts if no SIGN data */
    if(!rough&&!stone&&!tech){
      rough=d.roughCount||0;stone=d.stoneCount||0;
    }
    window._invRows.push({date:d.date,rough:rough,roughOT:roughOT,stone:stone,stoneOT:stoneOT,tech:tech,techOT:techOT});
  });
  renderInvRows();
}

function signSaveToInv(group,dt,state){
  if(!group||!group.length){alert("\u7121\u51fa\u5de5\u8cc7\u6599");return;}
  var saved=[];
  function findCIdx(loc){
    var parts=loc.split(" \uff0d ");var la=parts[0]||"";var lp=parts[1]||"";
    for(var i=0;i<C.length;i++){
      var cc=C[i];var ca=cc.alias||cc.con||"";
      if((ca+" \uff0d "+(cc.proj||""))===loc)return i;
      if(((cc.con||"")+" \uff0d "+(cc.proj||""))===loc)return i;
      if(ca===la&&(cc.proj||"")===lp)return i;
      if((cc.con||"")===la&&(cc.proj||"")===lp)return i;
    }
    return -1;
  }
  function upsertRow(cIdx,row){
    var ei=-1;
    for(var j=0;j<INV.length;j++){if(INV[j].clientIdx===cIdx){ei=j;break;}}
    if(ei>=0){
      INV[ei].rows=INV[ei].rows.filter(function(r){return r.date!==row.date;});
      INV[ei].rows.push(row);
      INV[ei].rows.sort(function(a,b){return rocDateInt(a.date)-rocDateInt(b.date);});
    } else {
      var _cc=cIdx>=0?C[cIdx]:null;
      var _invCid2=cIdx>=0&&C[cIdx]?C[cIdx].cid:undefined;
      INV.unshift({clientIdx:cIdx,clientCid:_invCid2,clientKey:_cc?(_cc.taxId||"")+"|"+(_cc.proj||""):"",month:"",payDate:rocToday2(),note:"",rows:[row]});
    }
  }
  group.forEach(function(item){
    var d=item.entry;var loc=d.loc||"";var cIdx=findCIdx(loc);
    var locW=[];
    (d.roughNames||[]).filter(function(n){return n;}).forEach(function(n){if(locW.indexOf(n)<0)locW.push(n);});
    (d.stoneNames||[]).filter(function(n){return n;}).forEach(function(n){if(locW.indexOf(n)<0)locW.push(n);});
    var totR=0,totROT=0,totS=0,totSOT=0,totT=0,totTOT=0;
    locW.forEach(function(name){
      var st=state[name];if(!st||st.selected===false)return;
      if(st.type==="rough"){totR+=st.count;totROT+=st.overtime;}
      else if(st.type==="stone"){totS+=st.count;totSOT+=st.overtime;}
      else if(st.type==="tech"){totT+=st.count;totTOT+=st.overtime;}
    });
    if(totR+totROT+totS+totSOT+totT+totTOT===0)return;
    /* Add 補工 counts */
    var buKey2="__bu__"+loc;
    var buSt2=state[buKey2];
    if(buSt2&&buSt2.selected&&buSt2.isBuGong){
      totR+=buSt2.rough||0;totROT+=buSt2.roughOT||0;
      totT+=buSt2.tech||0;totTOT+=buSt2.techOT||0;
      totS+=buSt2.stone||0;totSOT+=buSt2.stoneOT||0;
    }
    /* Only upsert if has any selected worker */
    if(totR+totROT+totS+totSOT+totT+totTOT>0){
      upsertRow(cIdx,{date:dt,rough:totR,roughOT:totROT,stone:totS,stoneOT:totSOT,tech:totT,techOT:totTOT});
    }

    var label=cIdx>=0?(C[cIdx].alias||C[cIdx].con||"\u672a\u77e5")+"\uff08"+loc+"\uff09":"\u672a\u77e5("+loc+")";
    saved.push(label);
  });
  if(!saved.length){alert("\u6c92\u6709\u5df2\u52fe\u9078\u4eba\u54e1");return;}
  sv("invoices",INV);
  saveSignState(dt,group,state);
  alert("\u5df2\u5b58\u5165\u8acb\u6b3e\u55ae\uff1a"+saved.join("\u3001"));
}

function svSign(){sv("sign",SIGN);}

function findSignEntry(date,locOrClientIdx){
  for(var i=0;i<SIGN.length;i++){
    if(SIGN[i].date===date&&(SIGN[i].loc===locOrClientIdx||SIGN[i].clientIdx===locOrClientIdx))return i;
  }
  return -1;
}

function getSignState(date){
  /* Returns state object keyed by idNo for buildSignSheet compatibility */
  var state={};
  SIGN.filter(function(e){return e.date===date;}).forEach(function(e){
    (e.entries||[]).forEach(function(en){
      state[en.idNo]={
        selected:en.confirmed,count:en.count,overtime:en.overtime,
        type:en.type,name:en.name
      };
    });
  });
  /* Restore buGong */
  SIGN.filter(function(e){return e.date===date;}).forEach(function(e){
    if(e.buGong&&e.buGong.selected!==false){
      state["__bu__"+e.loc]=Object.assign({isBuGong:true},e.buGong);
    }
  });
  return state;
}

function saveSignState(date,group,state){
  /* Persist sign state to SIGN DB */
  /* group = [{entry:{loc,...}}], state = {idNo:{selected,count,overtime,type,name}} */
  /* First remove old entries for this date */
  SIGN=SIGN.filter(function(e){return e.date!==date;});
  var byLoc={};
  group.forEach(function(item){
    var d=item.entry; var loc=d.loc||"";
    if(!byLoc[loc])byLoc[loc]={loc:loc,clientIdx:-1,entries:[]};
    var cIdx=findCIdxByLoc(loc);
    byLoc[loc].clientIdx=cIdx;
    (d.roughNames||[]).concat(d.stoneNames||[]).filter(function(n){return n;}).forEach(function(idNo){
      if(!byLoc[loc].entries.find(function(e){return e.idNo===idNo;})){
        var st=state[idNo]||{};
        byLoc[loc].entries.push({
          idNo:idNo,name:getName(idNo),
          type:st.type||"rough",count:st.count||1,
          overtime:st.overtime||0,confirmed:!!(st.selected)
        });
      }
    });
    /* Save buGong extra workers */
    var buKey="__bu__"+loc;
    var buSt=state[buKey];
    if(buSt&&buSt.isBuGong){
      byLoc[loc].buGong={rough:buSt.rough||0,roughOT:buSt.roughOT||0,
        tech:buSt.tech||0,techOT:buSt.techOT||0,
        stone:buSt.stone||0,stoneOT:buSt.stoneOT||0,
        selected:!!(buSt.selected)};
    }
  });
  Object.keys(byLoc).forEach(function(loc){
    var _se=Object.assign({date:date},byLoc[loc]);
    if(!_se.clientCid){var _sfi=findCIdxByLoc(_se.loc);if(_sfi>=0&&C[_sfi])_se.clientCid=C[_sfi].cid;}
    SIGN.push(_se);
  });
  svSign();
}

function findCIdxByLoc(loc){
  var parts=loc.split(" － ");var la=parts[0]||"";var lp=(parts.slice(1).join(" － "))||"";
  for(var i=0;i<C.length;i++){
    var cc=C[i];var ca=cc.alias||cc.con||"";
    if(cc.taxId&&cc.taxId===la&&(cc.proj||"")===lp)return i;
    if((ca+" － "+(cc.proj||""))===loc)return i;
    if(((cc.con||"")+" － "+(cc.proj||""))===loc)return i;
    if((ca===la||(cc.con||"")===la)&&(cc.proj||"")===lp)return i;
  }
  return -1;
}

function pgSign(){
  var act=document.getElementById("pact");act.innerHTML="";
  var pg=document.getElementById("pg");
  pg.innerHTML="<div id='signModal'></div>";

  /* Build data: group SIGN entries by clientIdx */
  /* Also read from INV rows as source of truth for confirmed data */
  /* Primary: use SIGN DB; supplement with INV */
  
  /* Get active clients */
  var activeClients=[];
  for(var i=0;i<C.length;i++){
    if(!C[i].status||C[i].status==="active")activeClients.push(i);
  }

  if(!activeClients.length&&!SIGN.length){
    var emp=document.createElement("div");emp.className="card";
    emp.innerHTML="<div class='ct'>DB6 簽單</div><p class='muted'>尚無進行中客戶，請先在客戶資料夾新增</p>";
    pg.insertBefore(emp,pg.firstChild);return;
  }

  /* For each active client, gather sign entries from SIGN DB */
  activeClients.forEach(function(ci){
    var cc=C[ci];
    var clientLabel=(cc.alias||cc.con||"")+(cc.proj?" － "+cc.proj:"");
    
    /* Get all SIGN entries for this client */
    var signRows=SIGN.filter(function(e){return e.clientIdx===ci;});
    
    /* Also get from INV */
    var invRec=null;
    for(var j=0;j<INV.length;j++){if(INV[j].clientIdx===ci){invRec=INV[j];break;}}
    
    /* Merge: build date→row map */
    var dateMap={};
    
    /* From SIGN */
    signRows.forEach(function(e){
      var dt=e.date;
      if(!dateMap[dt])dateMap[dt]={rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0,confirmed:false};
      (e.entries||[]).forEach(function(en){
        if(!en.confirmed)return;
        dateMap[dt].confirmed=true;
        if(en.type==="rough"){dateMap[dt].rough+=en.count;dateMap[dt].roughOT+=en.overtime||0;}
        else if(en.type==="stone"){dateMap[dt].stone+=en.count;dateMap[dt].stoneOT+=en.overtime||0;}
        else if(en.type==="tech"){dateMap[dt].tech+=en.count;dateMap[dt].techOT+=en.overtime||0;}
      });
    });
    
    /* From INV rows (authoritative) */
    if(invRec){
      (invRec.rows||[]).forEach(function(r){
        var dt=r.date;
        if(!dateMap[dt])dateMap[dt]={rough:0,roughOT:0,stone:0,stoneOT:0,tech:0,techOT:0,confirmed:true};
        dateMap[dt].rough=r.rough||0;dateMap[dt].roughOT=r.roughOT||0;
        dateMap[dt].stone=r.stone||0;dateMap[dt].stoneOT=r.stoneOT||0;
        dateMap[dt].tech=r.tech||0;dateMap[dt].techOT=r.techOT||0;
        dateMap[dt].confirmed=true;
      });
    }
    
    if(!Object.keys(dateMap).length)return; /* no data, skip this client */

    var card=document.createElement("div");card.className="card";card.style.marginBottom="16px";
    
    /* Client header */
    var cardHdr=document.createElement("div");cardHdr.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";
    var cardTitle=document.createElement("div");cardTitle.style.cssText="font-size:14px;font-weight:700;color:var(--txt);";
    cardTitle.textContent=clientLabel;
    var badge=document.createElement("span");badge.style.cssText="font-size:10px;background:rgba(63,185,80,.15);color:var(--green);border:1px solid var(--green);border-radius:4px;padding:2px 7px;";
    badge.textContent="進行中";
    cardHdr.appendChild(cardTitle);cardHdr.appendChild(badge);card.appendChild(cardHdr);
    
    /* Table */
    var tblWrap=document.createElement("div");tblWrap.style.cssText="overflow-x:auto;";
    var tbl=document.createElement("table");tbl.style.cssText="width:100%;border-collapse:collapse;font-size:12px;";
    
    /* Header */
    var thead=document.createElement("thead");
    var hrow=document.createElement("tr");
    var cols=["日期","粗工","粗工加班","技術工","技術工加班","打石工","打石工加班"];
    cols.forEach(function(col,ci2){
      var th=document.createElement("th");
      th.style.cssText="padding:6px 8px;text-align:"+(ci2===0?"left":"center")+";background:var(--s2);color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);white-space:nowrap;";
      th.textContent=col;hrow.appendChild(th);
    });
    thead.appendChild(hrow);tbl.appendChild(thead);
    
    /* Rows sorted new→old */
    var dates2=Object.keys(dateMap).sort(function(a,b){return rocDateInt(b)-rocDateInt(a);});
    var tbody=document.createElement("tbody");
    dates2.forEach(function(dt){
      var row=dateMap[dt];
      var tr=document.createElement("tr");
      tr.style.cssText="border-bottom:1px solid var(--bdr);";
      /* Format date as M/D */
      var dm=dt.match(/(\d+)月(\d+)日/);
      var dtLabel=dm?(dm[1]+"/"+dm[2]):dt;
      function td2(val,isDate){
        var td=document.createElement("td");
        td.style.cssText="padding:6px 8px;text-align:"+(isDate?"left":"center")+";font-family:'DM Mono',monospace;font-size:12px;"+(val&&!isDate?"color:var(--txt);font-weight:600;":"color:var(--mut);");
        td.textContent=(val||val===0)?(isDate?dtLabel:(val||"—")):"—";
        if(!isDate&&!val)td.textContent="—";
        tr.appendChild(td);
      }
      td2(dtLabel,true);
      td2(row.rough||0,false);td2(row.roughOT||0,false);
      td2(row.tech||0,false);td2(row.techOT||0,false);
      td2(row.stone||0,false);td2(row.stoneOT||0,false);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tblWrap.appendChild(tbl);card.appendChild(tblWrap);
    pg.insertBefore(card,pg.firstChild);
  });
  
  /* If no cards were added */
  if(pg.children.length<=1){
    var emp2=document.createElement("div");emp2.className="card";
    emp2.innerHTML="<div class='ct'>DB6 簽單</div><p class='muted'>尚無簽單記錄，請從出工表操作簽單</p>";
    pg.insertBefore(emp2,pg.firstChild);
  }
}

function getOwedSignDates(idNo){
  var wname=getName(idNo);
  var today=rocToday2();
  var todayKey=rocDateInt(today);
  var paidDates=[];
  var hasAdvance=false;
  SAL.forEach(function(rec){
    (rec.records||[]).forEach(function(r){
      if(r.name===idNo||r.name===wname||r.idNo===idNo){
        if(rec.payDate&&rocDateInt(rec.payDate)>todayKey) hasAdvance=true;
        (r.dates||[]).forEach(function(d){
          if(paidDates.indexOf(d.date)<0) paidDates.push(d.date);
        });
      }
    });
  });
  if(!paidDates.length) return {owed:[],advance:hasAdvance};
  var signedConfirmed={};
  SIGN.forEach(function(e){
    (e.entries||[]).forEach(function(en){
      if((en.idNo===idNo||en.name===wname)&&en.confirmed)
        signedConfirmed[e.date]=true;
    });
  });
  var owedDates=paidDates.filter(function(dt){return !signedConfirmed[dt];});
  owedDates.sort(function(a,b){return rocDateInt(a)-rocDateInt(b);});
  return {owed:owedDates,advance:hasAdvance};
}

function getUnpaidSignDates(idNo){
  var wname=getName(idNo);
  var confirmed=[];
  SIGN.forEach(function(e){
    (e.entries||[]).forEach(function(en){
      if((en.idNo===idNo||en.name===wname)&&en.confirmed)
        if(confirmed.indexOf(e.date)<0)confirmed.push(e.date);
    });
  });
  if(!confirmed.length)return [];
  var paid=[];
  SAL.forEach(function(rec){
    (rec.records||[]).forEach(function(r){
      if(r.name===idNo||r.name===wname||r.idNo===idNo)
        (r.dates||[]).forEach(function(d){if(paid.indexOf(d.date)<0)paid.push(d.date);});
    });
  });
  return confirmed.filter(function(dt){return paid.indexOf(dt)<0;})
    .sort(function(a,b){return rocDateInt(a)-rocDateInt(b);});
}

function getClientByCid(cid){
  if(cid===undefined||cid===null||cid==="")return null;
  for(var i=0;i<C.length;i++){if(C[i].cid===cid||C[i].cid===+cid)return C[i];}
  return null;
}
function getClientLabel(cid){
  var cc=getClientByCid(cid);
  if(!cc)return String(cid);
  return (cc.alias||cc.con||"")+(cc.proj?" － "+cc.proj:"");
}

function migrateATT(){
  /* Move ATT[w.id] to ATT[w.idNo], remove old key */
  var changed=false;
  W.forEach(function(w){
    if(!w.idNo)return;
    if(ATT[w.id]!==undefined&&ATT[w.idNo]===undefined){
      ATT[w.idNo]=ATT[w.id];
      delete ATT[w.id];
      changed=true;
    } else if(ATT[w.id]!==undefined&&ATT[w.idNo]!==undefined){
      /* Both exist: OR them, prefer true, remove old */
      ATT[w.idNo]=ATT[w.idNo]||ATT[w.id];
      delete ATT[w.id];
      changed=true;
    }
  });
  if(changed)sv("attendance",ATT);
}

function migrateQSEED(){
  var changed=false;
  QSEED.forEach(function(q,i){
    if(!q.qid){q.qid=i+1;changed=true;}
    if(!q.clientCid){
      for(var j=0;j<C.length;j++){
        if(C[j].con===q.clientName&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
        if(C[j].taxId&&C[j].taxId===q.taxId&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
      }
    }
  });
  Q.forEach(function(q,i){
    if(!q.qid){q.qid=i+1;changed=true;}
    if(!q.clientCid){
      for(var j=0;j<C.length;j++){
        if(C[j].con===q.clientName&&C[j].proj===q.proj){q.clientCid=C[j].cid;changed=true;break;}
      }
    }
  });
  if(changed)sv("quotes",Q);
}

(function(){
  var KEYS=["workers","clients","dispatch","dorm","ins","salary","attendance","sign","invoices","quotes"];

  /* Show spinner */
  var sp=document.createElement("div");
  sp.id="fbSp";
  sp.style.cssText="position:fixed;inset:0;background:#0d1117;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;";
  sp.innerHTML="<div style='width:40px;height:40px;border:3px solid #30363d;border-top-color:#f0b429;border-radius:50%;animation:_sp 0.8s linear infinite'></div><div style='color:#8b949e;font-size:13px;'>讀取資料中...</div><style>@keyframes _sp{to{transform:rotate(360deg)}}</style>";
  document.body.appendChild(sp);

  function launch(){
    /* Re-init globals from (possibly updated) localStorage */
    W=ld("workers",WDATA.map(function(w){return Object.assign({},w);}));
    C=ld("clients",[]);
    DT=ld("dispatch",[]);

    SAL=ld("salary",[]);
    ATT=ld("attendance",{});
    SIGN=ld("sign",[]);
    INV=ld("invoices",[]);
    migrateATT();
    migrateQSEED();
    var el=document.getElementById("fbSp");if(el)el.remove();
    go("w");
  }

  if(window.fbReady){
    /* Timeout: if Firebase takes >5s, launch anyway */
    var _fbTimeout=setTimeout(function(){
      console.warn("Firebase sync timeout, launching with local data");
      launch();
    },5000);
    window.fbSync(KEYS,function(){
      clearTimeout(_fbTimeout);
      launch();
    });
  } else {
    launch();
  }
})();

function exportBackup(){
  var keys=["workers","clients","dispatch","dorm","ins","salary","attendance","sign","invoices","quotes"];
  var bk={_exported:rocToday2(),_v:2};
  keys.forEach(function(k){try{var v=localStorage.getItem("cg_"+k);if(v)bk[k]=JSON.parse(v);}catch(e){}});
  var blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;
  a.download="工地備份_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert("備份下載完成！建議存到 Google Drive 保存");
}
function importBackup(){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".json";
  inp.addEventListener("change",function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var bk=JSON.parse(ev.target.result);
        var keys=["workers","clients","dispatch","dorm","ins","salary","attendance","sign","invoices","quotes"];
        var count=0;
        keys.forEach(function(k){
          if(bk[k]!==undefined){
            localStorage.setItem("cg_"+k,JSON.stringify(bk[k]));
            /* Also push to Firebase */
            if(window.fbReady)window.fbSv(k,bk[k]);
            count++;
          }
        });
        alert("\u5305\u542b "+count+" \u7b46\u8cc7\u6599\u5df2\u5339\u5165\uff01\n\u73fe\u5728\u91cd\u65b0\u8f09\u5165\u9801\u9762...");
        setTimeout(function(){location.reload();},500);
      }catch(err){
        alert("\u8b80\u53d6\u5931\u6557\uff1a"+err.message);
      }
    };
    reader.readAsText(file);
  });
  inp.click();
}
